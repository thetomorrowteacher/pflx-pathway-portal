    .pin-toggle {

    .world-map {

    /* ========== RADAR WIDGET ========== */
    .radar {
      position: fixed; top: 110px; left: 24px;
      width: 70px; height: 70px;
      border: 1px solid rgba(0,212,255,0.25);
      border-radius: 50%; background: rgba(6,10,18,0.7);
      z-index: 60; overflow: hidden;
    }
    .radar-sweep {
      position: absolute; top: 50%; left: 50%;
      width: 50%; height: 2px;
      background: linear-gradient(90deg, rgba(0,212,255,0.8), transparent);
      transform-origin: left center;
      animation: radarSweep 3s linear infinite;

    .radar-cross {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(0,212,255,0.4); font-family: 'Orbitron'; font-size: 14px;

    .radar::before {
      content: ''; position: absolute; top: 50%; left: 0; right: 0;
      height: 1px; background: rgba(0,212,255,0.1);
    }
    .radar::after {
      content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
      width: 1px; background: rgba(0,212,255,0.1);
    }
    @keyframes radarSweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ========== HUD BARS (top right) ========== */
    .hud-bars-container {
      position: fixed; top: 18px; right: 20px; z-index: 60;

    .hud-bars-box {
      width: 80px; height: 50px;
      border: 1px solid rgba(0,212,255,0.3);
      background: rgba(6,10,18,0.8);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 6px 8px; gap: 3px;

    .particle-layer { position: fixed; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }

    /* ========== PULSE RINGS ========== */
    .pulse-ring-layer { position: fixed; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
    .pulse-ring {
      position: absolute; border-radius: 50%;
      border: 2px solid rgba(0,212,255,0.2);
      top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.3);

    }

    /* ========== ENERGY SCAN LINES ========== */
    .scan-line-layer { position: fixed; inset: 0; z-index: 2; overflow: hidden; pointer-events: none; }
    .scan-line {

    }

    .aurora-layer {

      opacity: 0.5;
    }

    /* ========== STARS ========== */
    .star {
      position: fixed; border-radius: 50%; pointer-events: none;
      animation: twinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--delay); z-index: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.8; }
    }

function isHostUser(u) { return u.role === "admin" || u.isHost === true; }

// ═══════════════════════════════════════════════════════════════════════════
// LOAD USERS FROM SUPABASE (X-Coin shared backend)
// Pulls profile pictures, stats, badges, and any new players
// ═══════════════════════════════════════════════════════════════════════════
let _supabaseUsersLoaded = false;
async function loadUsersFromSupabase() {
  try {
    const { data, error } = await _supabase
      .from('app_data')
      .select('data')
      .eq('key', 'users')
      .single();
    if (!error && data && data.data && Array.isArray(data.data) && data.data.length > 0) {
      mockUsers = data.data;
      _supabaseUsersLoaded = true;
      // Re-populate the brand dropdown with fresh data
      brandSelect.innerHTML = '<option value="" disabled selected>Choose your brand…</option>';
      populateBrands();
      // Update the selected user preview if one was already selected
      if (selectedUser) {
        const fresh = mockUsers.find(u => u.id === selectedUser.id);
        if (fresh) {
          selectedUser = fresh;
          selectUser(fresh);
        }
      }
      console.log('[PFLX] Loaded ' + mockUsers.length + ' users from Supabase');
    }
  } catch(e) { console.warn('[PFLX] Supabase user load failed, using defaults:', e); }
}
// Fire immediately — will update the dropdown when ready
loadUsersFromSupabase();

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
let selectedUser = null;
let showPin = false;
let keepSignedIn = false;

// ═══════════════════════════════════════════════════════════════════════════
// DOM REFS
// ═══════════════════════════════════════════════════════════════════════════
const brandSelect = document.getElementById('brandSelect');
const stepSelect = document.getElementById('stepSelect');
const stepPin = document.getElementById('stepPin');
const pinInput = document.getElementById('pinInput');
const pinError = document.getElementById('pinError');
const pinSubmitBtn = document.getElementById('pinSubmitBtn');
const keepCheck = document.getElementById('keepCheck');

// ═══════════════════════════════════════════════════════════════════════════
// POPULATE BRAND DROPDOWN — same structure as X-Coin
// ═══════════════════════════════════════════════════════════════════════════
function populateBrands() {
  const hosts = mockUsers.filter(u => isHostUser(u));
  const players = mockUsers.filter(u => u.role === "player" && !u.isHost);

  // Host group
  const hostGroup = document.createElement('optgroup');
  hostGroup.label = '── Host ──';
  hosts.forEach(h => {
    const opt = document.createElement('option');
    opt.value = h.id;
    opt.textContent = '🛡 ' + (h.brandName || h.name);
    opt.style.background = '#0a1218';
    opt.style.color = '#fff';
    hostGroup.appendChild(opt);
  });
  brandSelect.appendChild(hostGroup);

  // Player group
  const playerGroup = document.createElement('optgroup');
  playerGroup.label = '── Players ──';
  players.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.brandName || p.name;
    opt.style.background = '#0a1218';
    opt.style.color = '#fff';
    playerGroup.appendChild(opt);
  });
  brandSelect.appendChild(playerGroup);
}
populateBrands();

// ═══════════════════════════════════════════════════════════════════════════
// STEP 1 HANDLER — Brand select goes straight to PIN
// ═══════════════════════════════════════════════════════════════════════════
brandSelect.addEventListener('change', () => {
  const id = brandSelect.value;
  if (!id) return;
  const match = mockUsers.find(u => u.id === id);
  if (match) {
    selectUser(match);
  }
});

// ═══════════════════════════════════════════════════════════════════════════
// TRANSITION TO PIN STEP
// ═══════════════════════════════════════════════════════════════════════════
function selectUser(user) {
  selectedUser = user;
  // Populate preview
  const avatarEl = document.getElementById('userAvatar');
  if (user.image) {
    avatarEl.innerHTML = `<img src="${user.image}" alt="">`;
  } else {
    avatarEl.textContent = user.avatar;
  }
  document.getElementById('userBrand').textContent = user.brandName || user.name;
  document.getElementById('userEmail').textContent = user.cohort ? user.cohort : (user.pathway || '');

  const roleTag = document.getElementById('userRole');
  if (isHostUser(user)) {
    roleTag.textContent = 'HOST';
    roleTag.className = 'user-role-tag host';
  } else {
    roleTag.textContent = 'PLAYER';
    roleTag.className = 'user-role-tag player';
  }

  // Switch steps
  stepSelect.classList.remove('active');
  stepPin.classList.add('active');
  pinInput.value = '';
  pinError.style.display = 'none';
  pinInput.classList.remove('error');
  pinSubmitBtn.classList.remove('active');
  setTimeout(() => pinInput.focus(), 100);
}

// ═══════════════════════════════════════════════════════════════════════════
// STEP 2: PIN HANDLERS
// ═══════════════════════════════════════════════════════════════════════════
pinInput.addEventListener('input', () => {
  pinInput.value = pinInput.value.replace(/\D/g, '').slice(0, 4);
  pinError.style.display = 'none';
  pinInput.classList.remove('error');
  pinSubmitBtn.classList.toggle('active', pinInput.value.length === 4);
});

pinInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && pinInput.value.length === 4) handlePinSubmit();
});

pinSubmitBtn.addEventListener('click', handlePinSubmit);

function handlePinSubmit() {
  if (!selectedUser || pinInput.value.length < 4) return;

  const correctPin = selectedUser.pin || (selectedUser.role === 'admin' ? '0000' : '1234');
  if (pinInput.value === correctPin) {
    // Save session
    localStorage.setItem('pflx_pathway_user', JSON.stringify(selectedUser));
    if (keepSignedIn) localStorage.setItem('pflx_pathway_keep_signed_in', 'true');
    // Navigate to portal
    window.location.href = 'preview.html';
  } else {
    pinError.textContent = 'Incorrect PIN. Contact your instructor.';
    pinError.style.display = 'block';
    pinInput.classList.add('error');
    pinInput.value = '';
    pinSubmitBtn.classList.remove('active');
  }
}

// Change button — go back to step 1
document.getElementById('changeBtn').addEventListener('click', () => {
  selectedUser = null;
  stepPin.classList.remove('active');
  stepSelect.classList.add('active');
  pinInput.value = '';
  brandSelect.value = '';
});

// PIN toggle visibility
document.getElementById('pinToggle').addEventListener('click', () => {
  showPin = !showPin;
  pinInput.type = showPin ? 'text' : 'password';
  pinInput.style.letterSpacing = showPin ? '0.2em' : '0.5em';
  document.getElementById('pinToggle').textContent = showPin ? '🙈' : '👁';
});

// Keep signed in checkbox
keepCheck.addEventListener('click', () => {
  keepSignedIn = !keepSignedIn;
  keepCheck.classList.toggle('checked', keepSignedIn);
});

// Reset PIN
document.getElementById('resetPinBtn').addEventListener('click', () => {
  alert('Contact your instructor to reset your PIN.');
});

// ═══════════════════════════════════════════════════════════════════════════
// AUTO-LOGIN CHECK

const existingSession = localStorage.getItem('pflx_pathway_user');
const staySignedIn = localStorage.getItem('pflx_pathway_keep_signed_in');
if (existingSession && staySignedIn) {
  // Auto-login
  window.location.href = 'preview.html';
}

// BACKGROUND ANIMATIONS

// Stars
for (let i = 0; i < 80; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  const colors = ['rgba(0,212,255,0.5)','rgba(255,255,255,0.25)','rgba(139,92,246,0.4)','rgba(255,255,255,0.15)'];

    width:${size}px;height:${size}px;

  `;
  document.body.appendChild(star);

// HUD Bars (JS-driven animation)
const hb = document.getElementById('hudBars');
const hudBars = [];
for (let i = 0; i < 10; i++) {
  const b = document.createElement('div');
  b.className = 'hud-b';
  const baseH = 6 + i * 3;
  b.style.height = baseH + 'px';
  hb.appendChild(b);
  hudBars.push({ el: b, base: baseH });
}
setInterval(() => {
  hudBars.forEach(bar => {
    const h = bar.base + Math.random() * 16 - 4;
    const clamped = Math.max(3, Math.min(38, h));
    bar.el.style.height = clamped + 'px';
    bar.el.style.opacity = 0.4 + (clamped / 38) * 0.6;
  });
}, 700);

// Floating Particles (dramatic, JS-driven)
const particleLayer = document.getElementById('particleLayer');
const particles = [];
const PARTICLE_COLORS = [
  { rgb: '0,212,255',   maxOp: 0.6,  weight: 0.40 },
  { rgb: '139,92,246',  maxOp: 0.5,  weight: 0.25 },
  { rgb: '255,0,255',   maxOp: 0.35, weight: 0.15 },
  { rgb: '255,255,255', maxOp: 0.25, weight: 0.20 },
];
function pickColor() {
  let r = Math.random(), cum = 0;
  for (const c of PARTICLE_COLORS) { cum += c.weight; if (r < cum) return c; }
  return PARTICLE_COLORS[0];
}
for (let i = 0; i < 55; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 4.5 + 1.5;
  const c = pickColor();
  const x = Math.random() * 100;
  const y = Math.random() * 100;
  p.style.cssText = `left:${x}%;top:${y}%;width:${size}px;height:${size}px;opacity:0;`;
  particleLayer.appendChild(p);
  particles.push({ el: p, color: c.rgb, maxOp: c.maxOp, size, baseX: x, baseY: y,
    phase: Math.random() * Math.PI * 2, speed: 0.4 + Math.random() * 0.6 });
}
function animateParticles() {
  const t = Date.now() / 1000;
  particles.forEach(p => {
    const cycle = Math.sin(t * p.speed + p.phase);
    const drift = Math.sin(t * 0.25 + p.phase * 2);
    const pulse = (Math.sin(t * 1.2 + p.phase * 3) + 1) * 0.15;
    const op = Math.min(1, ((cycle + 1) / 2) * p.maxOp + pulse);
    const tx = drift * 80;
    const ty = Math.cos(t * 0.3 + p.phase) * 60;
    p.el.style.opacity = op.toFixed(3);
    p.el.style.transform = `translate(${tx.toFixed(1)}px, ${ty.toFixed(1)}px)`;
    p.el.style.boxShadow = `0 0 ${p.size * 5}px rgba(${p.color},${(op * 0.7).toFixed(3)}), 0 0 ${p.size * 12}px rgba(${p.color},${(op * 0.2).toFixed(3)})`;
    p.el.style.background = `rgba(${p.color},${op.toFixed(3)})`;
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// Pulse Rings (dramatic, JS-driven)
const pulseRingLayer = document.getElementById('pulseRingLayer');
const pulseRings = [];
const ringColors = ['0,212,255','139,92,246','255,0,255','0,212,255','139,92,246'];
for (let i = 0; i < 5; i++) {
  const ring = document.createElement('div');
  ring.className = 'pulse-ring';
  const maxSize = 300 + i * 200;
  ring.style.cssText = `width:${maxSize}px;height:${maxSize}px;border-color:rgba(${ringColors[i]},0.25);`;
  pulseRingLayer.appendChild(ring);
  pulseRings.push({ el: ring, duration: 5000 + i * 2500, offset: i * 2000, start: Date.now(), color: ringColors[i] });
}
function animatePulseRings() {
  const now = Date.now();
  pulseRings.forEach(r => {
    const elapsed = (now - r.start + r.offset) % r.duration;
    const progress = elapsed / r.duration;
    const scale = 0.2 + progress * 0.8;
    const op = progress < 0.08 ? (progress / 0.08) * 0.4
             : progress < 0.4 ? 0.4 - (progress - 0.08) / 0.32 * 0.25
             : Math.max(0, 0.15 - (progress - 0.4) / 0.6 * 0.15);
    r.el.style.transform = `translate(-50%, -50%) scale(${scale.toFixed(3)})`;
    r.el.style.opacity = op.toFixed(3);
    r.el.style.borderColor = `rgba(${r.color},${(op * 0.6).toFixed(3)})`;
    r.el.style.boxShadow = `0 0 30px rgba(${r.color},${(op * 0.3).toFixed(3)}), inset 0 0 30px rgba(${r.color},${(op * 0.1).toFixed(3)})`;
  });
  requestAnimationFrame(animatePulseRings);
}
animatePulseRings();

// Energy Scan Lines
const scanLineLayer = document.getElementById('scanLineLayer');
const scanLines = [];
const scanColors = ['0,212,255','139,92,246','255,0,255'];
for (let i = 0; i < 3; i++) {
  const line = document.createElement('div');
  line.className = 'scan-line';
  line.style.background = `linear-gradient(90deg, transparent 0%, rgba(${scanColors[i]},0.0) 10%, rgba(${scanColors[i]},0.4) 50%, rgba(${scanColors[i]},0.0) 90%, transparent 100%)`;
  line.style.boxShadow = `0 0 20px 4px rgba(${scanColors[i]},0.15), 0 0 60px 8px rgba(${scanColors[i]},0.06)`;
  scanLineLayer.appendChild(line);
  scanLines.push({ el: line, duration: 8000 + i * 3000, offset: i * 3500, start: Date.now() });
}
function animateScanLines() {
  const now = Date.now();
  scanLines.forEach(s => {
    const elapsed = (now - s.start + s.offset) % s.duration;
    const progress = elapsed / s.duration;
    const yPos = progress * 120 - 10;
    const op = progress < 0.05 ? progress / 0.05
             : progress < 0.9 ? 1
             : (1 - progress) / 0.1;
    s.el.style.top = yPos + '%';
    s.el.style.opacity = (op * 0.5).toFixed(3);
  });
  requestAnimationFrame(animateScanLines);
}
animateScanLines();

// Aurora Gradient
const auroraLayer = document.getElementById('auroraLayer');
function animateAurora() {
  const t = Date.now() / 1000;
  const x1 = 30 + Math.sin(t * 0.1) * 20;
  const y1 = 20 + Math.cos(t * 0.08) * 15;
  const x2 = 70 + Math.sin(t * 0.12 + 2) * 20;
  const y2 = 80 + Math.cos(t * 0.09 + 1) * 15;
  const op = 0.4 + Math.sin(t * 0.15) * 0.2;
  auroraLayer.style.background = `
    radial-gradient(ellipse at ${x1}% ${y1}%, rgba(0,212,255,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at ${x2}% ${y2}%, rgba(139,92,246,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255,0,255,0.04) 0%, transparent 60%)`;
  auroraLayer.style.opacity = op.toFixed(3);
  requestAnimationFrame(animateAurora);
}
animateAurora();
