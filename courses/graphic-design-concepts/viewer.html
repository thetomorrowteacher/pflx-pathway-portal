<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphic Design Concepts — PFLX CourseViewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --pflx-cyan: #00d4ff;
      --pflx-teal: #00b8d4;
      --pflx-cyan-dim: rgba(0, 212, 255, 0.35);
      --pflx-cyan-faint: rgba(0, 212, 255, 0.12);
      --pflx-dark: #0a0e17;
      --pflx-darker: #050810;
      --pflx-panel: rgba(10, 14, 23, 0.85);
      --pflx-panel-solid: #0a0e17;
      --pflx-magenta: #ff00ff;
      --pflx-purple: #8b5cf6;
      --pflx-green: #10e090;
      --pflx-amber: #ffa500;
      --pflx-red: #ff4466;
      --pflx-text: #e0e6ef;
      --pflx-muted: #7a8ba0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--pflx-darker);
      color: var(--pflx-text);
      width: 100vw;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(0, 212, 255, 0.06), transparent 50%),
        radial-gradient(ellipse at 85% 85%, rgba(139, 92, 246, 0.05), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ========== TOP BAR ========== */
    .top-bar {
      position: sticky; top: 0;
      z-index: 100;
      display: flex; align-items: center;
      padding: 14px 24px;
      background: rgba(5, 8, 16, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--pflx-cyan-dim);
      gap: 20px;
    }
    .back-to-map {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--pflx-cyan);
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--pflx-cyan-dim);
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .back-to-map:hover {
      background: var(--pflx-cyan-faint);
      border-color: var(--pflx-cyan);
    }
    .course-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.08em;
      color: var(--pflx-cyan);
      text-transform: uppercase;
      flex: 1;
    }
    .course-title .pathway-tag {
      font-size: 10px;
      color: var(--pflx-muted);
      letter-spacing: 0.15em;
      margin-left: 12px;
    }
    .progress-container { flex: 2; display: flex; align-items: center; gap: 12px; max-width: 500px; }
    .progress-bar-outer {
      flex: 1;
      height: 6px;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid var(--pflx-cyan-dim);
      border-radius: 3px;
      position: relative;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--pflx-teal), var(--pflx-cyan));
      box-shadow: 0 0 8px var(--pflx-cyan);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .progress-bar-inner::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 20px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
    }
    .progress-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--pflx-cyan);
      min-width: 90px;
      text-align: right;
    }

    /* ========== LAYOUT ========== */
    .viewer-layout {
      display: flex;
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 61px);
    }
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: rgba(10, 14, 23, 0.6);
      border-right: 1px solid var(--pflx-cyan-dim);
      padding: 24px 0;
      position: sticky;
      top: 61px;
      height: calc(100vh - 61px);
      overflow-y: auto;
      backdrop-filter: blur(8px);
    }
    .sidebar-header {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--pflx-muted);
      padding: 0 24px 16px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--pflx-cyan-faint);
      margin-bottom: 12px;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
      position: relative;
    }
    .sidebar-item:hover {
      background: var(--pflx-cyan-faint);
    }
    .sidebar-item.current {
      border-left-color: var(--pflx-cyan);
      background: linear-gradient(90deg, var(--pflx-cyan-faint), transparent);
    }
    .sidebar-item.complete {
      opacity: 0.95;
    }
    .sidebar-item.locked {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .sidebar-item .num {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--pflx-muted);
      width: 24px;
      flex-shrink: 0;
    }
    .sidebar-item.current .num { color: var(--pflx-cyan); }
    .sidebar-item.complete .num { color: var(--pflx-green); }
    .sidebar-item .title-text {
      font-size: 13px;
      color: var(--pflx-text);
      flex: 1;
    }
    .sidebar-item.current .title-text {
      color: var(--pflx-cyan);
      font-weight: 500;
    }
    .sidebar-item .state-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid var(--pflx-muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    .sidebar-item.current .state-icon {
      border-color: var(--pflx-cyan);
      background: var(--pflx-cyan-faint);
      animation: pulse 2s infinite;
    }
    .sidebar-item.complete .state-icon {
      background: var(--pflx-green);
      border-color: var(--pflx-green);
      color: var(--pflx-darker);
    }
    .sidebar-item.complete .state-icon::after { content: '✓'; font-weight: bold; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--pflx-cyan-dim); }
      50% { box-shadow: 0 0 0 6px transparent; }
    }

    /* ========== SLIDE CANVAS ========== */
    .slide-canvas {
      flex: 1;
      padding: 40px 48px 120px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }
    .slide {
      background: var(--pflx-panel);
      border: 1px solid var(--pflx-cyan-dim);
      border-radius: 12px;
      padding: 48px 56px;
      position: relative;
      backdrop-filter: blur(12px);
      overflow: hidden;
    }
    .slide::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--pflx-cyan), transparent);
    }
    .slide-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--pflx-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .slide-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--pflx-cyan);
      letter-spacing: 0.02em;
      margin-bottom: 24px;
      line-height: 1.3;
    }
    .slide-body {
      font-size: 17px;
      line-height: 1.7;
      color: var(--pflx-text);
    }
    .slide-body h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      color: var(--pflx-cyan);
      margin-top: 20px;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }
    .slide-body p { margin-bottom: 14px; }
    .slide-body ul { margin-left: 20px; margin-bottom: 14px; }
    .slide-body li { margin-bottom: 8px; }
    .slide-body strong { color: var(--pflx-cyan); font-weight: 600; }
    .slide-body em { color: var(--pflx-purple); font-style: normal; }
    .slide-body a { color: var(--pflx-cyan); text-decoration: underline; }

    .callout {
      padding: 16px 20px;
      border-radius: 8px;
      margin: 18px 0;
      border-left: 3px solid;
      font-size: 15px;
    }
    .callout.info {
      background: rgba(0, 212, 255, 0.06);
      border-color: var(--pflx-cyan);
    }
    .callout.success {
      background: rgba(16, 224, 144, 0.08);
      border-color: var(--pflx-green);
    }
    .callout.warn {
      background: rgba(255, 165, 0, 0.08);
      border-color: var(--pflx-amber);
    }

    /* ========== MEDIA ========== */
    .video-wrap {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--pflx-cyan-dim);
      margin: 16px 0;
    }
    .video-wrap iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
    }
    .video-caption {
      font-size: 14px;
      color: var(--pflx-muted);
      margin-top: 4px;
      font-style: italic;
    }
    .hero-image {
      width: 100%;
      border-radius: 8px;
      display: block;
      margin: 12px 0 20px;
    }

    /* ========== NAV BAR ========== */
    .nav-bar {
      position: fixed;
      bottom: 0; left: 280px; right: 0;
      padding: 16px 48px;
      background: rgba(5, 8, 16, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--pflx-cyan-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 50;
    }
    .nav-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      letter-spacing: 0.12em;
      padding: 12px 28px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .nav-btn.back {
      background: transparent;
      color: var(--pflx-muted);
      border: 1px solid var(--pflx-cyan-dim);
    }
    .nav-btn.back:hover { color: var(--pflx-cyan); border-color: var(--pflx-cyan); }
    .nav-btn.next {
      background: linear-gradient(135deg, var(--pflx-teal), var(--pflx-cyan));
      color: var(--pflx-darker);
      border: 0;
      font-weight: 700;
      box-shadow: 0 0 16px rgba(0, 212, 255, 0.4);
    }
    .nav-btn.next:hover { box-shadow: 0 0 24px rgba(0, 212, 255, 0.7); }
    .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
    .nav-hint {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--pflx-amber);
    }

    /* ========== GENERIC INTERACTION BLOCK ========== */
    .interaction {
      margin-top: 28px;
      padding: 24px;
      background: rgba(0, 212, 255, 0.03);
      border: 1px solid var(--pflx-cyan-dim);
      border-radius: 8px;
      position: relative;
    }
    .interaction-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--pflx-cyan);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .interaction-prompt {
      font-size: 16px;
      color: var(--pflx-text);
      margin-bottom: 16px;
      font-weight: 500;
    }
    .field-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--pflx-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    /* ========== FORM ELEMENTS ========== */
    input[type="text"], input[type="url"], textarea, select {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      color: var(--pflx-text);
      border: 1px solid var(--pflx-cyan-dim);
      border-radius: 6px;
      padding: 12px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, input[type="url"]:focus, textarea:focus {
      outline: none;
      border-color: var(--pflx-cyan);
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.25);
    }
    textarea { resize: vertical; min-height: 100px; font-family: 'Share Tech Mono', monospace; font-size: 13px; }
    button.action {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      padding: 10px 20px;
      border-radius: 4px;
      background: linear-gradient(135deg, var(--pflx-teal), var(--pflx-cyan));
      color: var(--pflx-darker);
      border: 0;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    button.action:hover { box-shadow: 0 0 12px rgba(0, 212, 255, 0.5); }
    button.action.ghost {
      background: transparent;
      color: var(--pflx-cyan);
      border: 1px solid var(--pflx-cyan-dim);
    }
    button.action.ghost:hover { background: var(--pflx-cyan-faint); border-color: var(--pflx-cyan); }
    button.action:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

    /* ========== TIER LIST ENGINE ========== */
    .tier-grid { display: grid; gap: 12px; margin-top: 8px; }
    .tier-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 0;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--pflx-cyan-faint);
      border-radius: 6px;
      min-height: 80px;
      align-items: stretch;
      overflow: hidden;
    }
    .tier-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      border-right: 1px solid var(--pflx-cyan-faint);
      padding: 10px 8px;
      text-align: center;
      gap: 4px;
    }
    .tier-letter {
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.04em;
    }
    .tier-desc {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.85;
      line-height: 1.2;
      max-width: 110px;
    }
    .tier-row.tier-S .tier-label { color: var(--pflx-cyan); background: rgba(0, 212, 255, 0.12); }
    .tier-row.tier-A .tier-label { color: var(--pflx-green); background: rgba(16, 224, 144, 0.1); }
    .tier-row.tier-B .tier-label { color: var(--pflx-amber); background: rgba(255, 165, 0, 0.1); }
    .tier-row.tier-C .tier-label { color: var(--pflx-muted); background: rgba(122, 139, 160, 0.08); }
    .tier-row.tier-U .tier-label { color: var(--pflx-muted); background: transparent; font-size: 10px; }
    .tier-items { padding: 8px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .tier-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid var(--pflx-cyan-dim);
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tier-chip:hover { background: var(--pflx-cyan-faint); border-color: var(--pflx-cyan); }
    .tier-chip.selected { box-shadow: 0 0 10px var(--pflx-cyan); }
    .tier-controls {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .tier-controls button {
      flex: 1;
      padding: 6px 10px;
      font-size: 11px;
      background: transparent;
      border: 1px solid var(--pflx-cyan-dim);
      color: var(--pflx-text);
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.1em;
    }
    .tier-controls button:hover { background: var(--pflx-cyan-faint); }

    /* ========== SIGNAL WALL ========== */
    .signal-wall {
      margin-top: 12px;
    }
    .signal-composer {
      padding: 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--pflx-cyan-dim);
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .signal-composer > * + * { margin-top: 10px; }
    .signal-feed { display: grid; gap: 14px; }
    .signal-card {
      padding: 16px;
      background: rgba(0, 212, 255, 0.04);
      border: 1px solid var(--pflx-cyan-faint);
      border-radius: 8px;
    }
    .signal-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .signal-author {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      color: var(--pflx-cyan);
      letter-spacing: 0.1em;
    }
    .signal-boost {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--pflx-cyan-dim);
      color: var(--pflx-cyan);
      padding: 4px 10px;
      border-radius: 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      cursor: pointer;
    }
    .signal-boost:hover { background: var(--pflx-cyan-faint); }
    .signal-boost.boosted { background: var(--pflx-cyan); color: var(--pflx-darker); border-color: var(--pflx-cyan); }
    .signal-body { font-size: 15px; line-height: 1.5; }
    .signal-image { margin-top: 10px; border-radius: 6px; max-width: 100%; }
    .signal-theme-tag {
      display: inline-block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--pflx-purple);
      background: rgba(139, 92, 246, 0.12);
      padding: 3px 8px;
      border-radius: 10px;
      margin-right: 6px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ========== WAYPOINT ========== */
    .waypoint-canvas {
      position: relative;
      display: inline-block;
      width: 100%;
      border: 1px solid var(--pflx-cyan-dim);
      border-radius: 8px;
      overflow: hidden;
      cursor: crosshair;
    }
    .waypoint-canvas img { display: block; width: 100%; height: auto; user-select: none; }
    .waypoint-pin {
      position: absolute;
      width: 32px;
      height: 32px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.8), 0 2px 8px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 12px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .waypoint-pin:hover { transform: translate(-50%, -50%) scale(1.15); }
    .waypoint-pin.fundamentals { background: var(--pflx-cyan); }
    .waypoint-pin.layout { background: var(--pflx-green); }
    .waypoint-pin.typography { background: var(--pflx-purple); }
    .waypoint-pin.color { background: var(--pflx-magenta); }
    .waypoint-pin.images { background: var(--pflx-amber); }
    .waypoint-pin.untagged { background: var(--pflx-muted); }
    .waypoint-tag-picker {
      position: absolute;
      background: var(--pflx-panel-solid);
      border: 1px solid var(--pflx-cyan);
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.7);
      z-index: 20;
      display: grid;
      gap: 6px;
      min-width: 200px;
    }
    .waypoint-tag-picker button {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--pflx-cyan-dim);
      color: var(--pflx-text);
      border-radius: 4px;
      cursor: pointer;
      text-align: left;
    }
    .waypoint-tag-picker button:hover { background: var(--pflx-cyan-faint); }
    .waypoint-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
      font-size: 13px;
    }
    .waypoint-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .waypoint-legend-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid white;
    }

    /* ========== DATA CARDS ========== */
    .data-cards-shell { display: grid; grid-template-columns: 1fr 280px; gap: 18px; margin-top: 8px; }
    @media (max-width: 900px) { .data-cards-shell { grid-template-columns: 1fr; } }
    .data-card-main {
      perspective: 1000px;
      min-height: 320px;
    }
    .data-card {
      position: relative;
      width: 100%;
      min-height: 320px;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

  <script type="text/babel" data-type="module">
/* =========================================================================
   PFLX CourseViewer — Graphic Design Concepts
   Prototype renderer for the 15-slide course format defined in the
   pflx-course-builder skill. Loads course.json, renders every slide type,
   every interaction mode used in this course, plus the two composition
   patterns (tierListCompare companionReveal + companionActions).

   State is in-memory. A real build would wire this up to pflx_cloud_save.
   Progress % + slide completion fire a visible Save indicator to mock that.
   ========================================================================= */

const { useState, useReducer, useEffect, useRef, useMemo, useCallback } = React;
const course = JSON.parse(document.getElementById('course-manifest').textContent);

/* ============ PFLX SESSION ============
   In production (Core Pathways app integration), session is propagated from
   PFLX Platform SSO. The CourseViewer expects `window.PFLX_SESSION` to be
   populated by the shell before the viewer mounts:

     window.PFLX_SESSION = {
       playerId, displayName, initials, studio, cohort,
       rank:   'Scout'|'Associate'|'Manager'|'Director'|'Producer'|'Partner'|'God',
       role:   'player'|'host'|'god',     // convenience flag
       brandBoard, shipTier, evoLevel, xcBalance
     };

   For this standalone prototype, identity can be injected via URL params:
     ?pid=p-ennis&name=Ennis&rank=Director&role=host
   Defaults to a plain Scout-rank player if nothing is set. */
const session = (function resolveSession() {
  if (typeof window.PFLX_SESSION === 'object' && window.PFLX_SESSION) return window.PFLX_SESSION;
  const qs = new URLSearchParams(window.location.search);
  const name = qs.get('name') || 'Player';
  return {
    playerId: qs.get('pid') || 'p-me',
    displayName: name,
    initials: (name.match(/\b[A-Z]/g) || [name[0] || 'P']).slice(0, 2).join('').toUpperCase(),
    studio: qs.get('studio') || 'emagination',
    cohort: qs.get('cohort') || 'spring-2026',
    rank: qs.get('rank') || 'Scout',
    role: qs.get('role') || 'player',
    brandBoard: null,
    shipTier: 'Scout MK-I',
    evoLevel: 1,
    xcBalance: 0
  };
})();

// Host Dashboard access is ROLE-based, not rank-based.
// Player rank (Scout → Partner) is a player-progression ladder that unlocks
// in-activity leadership privileges. The Host role is a separate permission
// reserved for adults/facilitators running the program. A Partner-rank
// player is still a player — they do NOT get Host Dashboard access.
const canAccessHostDashboard = session.role === 'host' || session.role === 'god';

// ---------- MOCK DATA (cohort responses, peers, etc.) ----------
const mockCohort = {
  peers: [
    { id: 'p-ava', name: 'Ava M.', initials: 'AM', studio: 'eMagination' },
    { id: 'p-kai', name: 'Kai R.', initials: 'KR', studio: 'MindForge' },
    { id: 'p-jun', name: 'Jun S.', initials: 'JS', studio: 'Innov8' },
    { id: 'p-leo', name: 'Leo P.', initials: 'LP', studio: 'Gentech' }
  ],
  existingSignals: [
    { id: 'sig-1', author: 'Ava M.', initials: 'AM', body: 'The Duolingo owl on the subway ads — the green is SO loud and the expression does half the work.', image: null, boosts: 7, theme: 'brand-iconography' },
    { id: 'sig-2', author: 'Kai R.', initials: 'KR', body: "Noticed Apple's new Vision Pro billboard — not a single product shot, just a face and a reflection. Image doing ALL the talking.", image: null, boosts: 12, theme: 'images' },
    { id: 'sig-3', author: 'Jun S.', initials: 'JS', body: 'A ramen shop in my neighborhood uses only two fonts on everything — storefront, menu, receipts. Feels so intentional.', image: null, boosts: 4, theme: 'typography' }
  ],
  broadcastCues: {
    c1: { a: 22, b: 31, c: 15, d: 32 },   // Cohort Pulse mock split (%)
    c2: ['communicate', 'solve', 'simplify', 'show', 'emote', 'sell', 'identify', 'inspire'] // Nebula words
  }
};

// ---------- TIER LIST COMPARE MOCK ----------
// Pretend a previous cohort consensus exists. Used for cohortConsensusReveal.
const mockTierListConsensus = {
  'sub-fundamentals': 'A',
  'sub-layout': 'B',
  'sub-typography': 'B',
  'sub-color': 'A',
  'sub-images': 'A'
};

// ---------- REDUCER ----------
const initialState = {
  currentSlideIdx: 0,
  slideStates: Object.fromEntries(course.slides.map(s => [s.id, {
    completed: false,
    startedAt: null,
    completedAt: null,
    response: null
  }])),
  saveIndicator: null,
};

function reducer(state, action) {
  switch (action.type) {
    case 'GOTO':
      return { ...state, currentSlideIdx: action.idx };
    case 'SET_RESPONSE': {
      const next = { ...state.slideStates };
      const was = next[action.slideId] || { completed: false };
      next[action.slideId] = { ...was, response: action.response };
      return { ...state, slideStates: next };
    }
    case 'MARK_COMPLETE': {
      const next = { ...state.slideStates };
      const was = next[action.slideId] || {};
      if (was.completed) return state;
      next[action.slideId] = {
        ...was,
        completed: true,
        startedAt: was.startedAt || new Date().toISOString(),
        completedAt: new Date().toISOString()
      };
      return { ...state, slideStates: next, saveIndicator: Date.now() };
    }
    case 'CLEAR_SAVE_INDICATOR':
      return { ...state, saveIndicator: null };
    default: return state;
  }
}

// ---------- HELPERS ----------
function computeProgress(state) {
  const required = course.slides.filter(s => s.required !== false);
  const done = required.filter(s => state.slideStates[s.id]?.completed).length;
  return {
    completed: done,
    total: required.length,
    pct: Math.round((done / required.length) * 100)
  };
}
function isSlideCompleteInState(state, slideId) {
  return !!state.slideStates[slideId]?.completed;
}
function slideStateIcon(state, slide, currentIdx) {
  const idx = course.slides.indexOf(slide);
  if (state.slideStates[slide.id]?.completed) return 'complete';
  if (idx === currentIdx) return 'current';
  return 'pending';
}

// ---------- TOP-LEVEL COURSE VIEWER ----------
function CourseViewer() {
  const [state, dispatch] = useReducer(reducer, initialState);
  const progress = computeProgress(state);
  const currentSlide = course.slides[state.currentSlideIdx];

  // Save indicator auto-hide
  useEffect(() => {
    if (!state.saveIndicator) return;
    const t = setTimeout(() => dispatch({ type: 'CLEAR_SAVE_INDICATOR' }), 1800);
    return () => clearTimeout(t);
  }, [state.saveIndicator]);

  const setResponse = useCallback((slideId, response) => {
    dispatch({ type: 'SET_RESPONSE', slideId, response });
  }, []);
  const markComplete = useCallback((slideId) => {
    dispatch({ type: 'MARK_COMPLETE', slideId });
  }, []);

  const canAdvance = () => {
    if (currentSlide.required === false) return true;
    if (!slideRequiresCompletion(currentSlide)) return true;
    return isSlideCompleteInState(state, currentSlide.id);
  };

  const goNext = () => {
    markComplete(currentSlide.id);
    if (state.currentSlideIdx < course.slides.length - 1) {
      dispatch({ type: 'GOTO', idx: state.currentSlideIdx + 1 });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };
  const goBack = () => {
    if (state.currentSlideIdx > 0) {
      dispatch({ type: 'GOTO', idx: state.currentSlideIdx - 1 });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };
  const jumpTo = (idx) => {
    if (course.settings?.navigationMode === 'sequential') {
      const sidebarIdx = idx;
      const targetSlide = course.slides[sidebarIdx];
      if (!isSlideCompleteInState(state, targetSlide.id) && sidebarIdx > state.currentSlideIdx) return;
    }
    dispatch({ type: 'GOTO', idx });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  return (
    <>
      <TopBar progress={progress} courseTitle={course.title} />
      <div className="viewer-layout">
        <Sidebar slides={course.slides}
                 slideStates={state.slideStates}
                 currentSlideIdx={state.currentSlideIdx}
                 onNavigate={jumpTo}
                 navigationMode={course.settings?.navigationMode || 'free'} />
        <div className="slide-canvas">
          <SlideRenderer slide={currentSlide}
                          slideIdx={state.currentSlideIdx}
                          state={state}
                          setResponse={setResponse}
                          markComplete={markComplete} />
        </div>
      </div>
      <NavBar canAdvance={canAdvance()}
              atStart={state.currentSlideIdx === 0}
              atEnd={state.currentSlideIdx === course.slides.length - 1}
              onBack={goBack}
              onNext={goNext}
              currentSlide={currentSlide}
              state={state} />
      <SaveIndicator visible={!!state.saveIndicator} />
    </>
  );
}

function slideRequiresCompletion(slide) {
  // Non-interactive or always-advance-able slides
  const fixedAdvance = ['title', 'overview', 'why', 'completion'];
  if (fixedAdvance.includes(slide.type)) return false;
  return true;
}

// ---------- BODY BLOCK RENDERER ----------
function BodyBlocks({ blocks }) {
  if (!blocks) return null;
  return (
    <div className="slide-body">
      {blocks.map((b, i) => {
        if (b.kind === 'markdown') return <Markdown key={i} content={b.content} />;
        if (b.kind === 'video') return (
          <div key={i}>
            <VideoEmbed url={b.url} />
            {b.caption && <div className="video-caption">{b.caption}</div>}
          </div>
        );
        if (b.kind === 'image') return <img key={i} src={b.url} alt={b.alt || ''} className="hero-image" />;
        if (b.kind === 'embed') return (
          <div key={i} className="video-wrap" style={{ paddingBottom: b.height ? `${b.height}px` : '56.25%' }}>
            <iframe src={b.url} allowFullScreen />
          </div>
        );
        if (b.kind === 'callout') return <div key={i} className={`callout ${b.tone || 'info'}`}>{b.content}</div>;
        return null;
      })}
    </div>
  );
}

function Markdown({ content }) {
  // Minimalist markdown: headings, bold, italic, lists, links, paragraphs
  const html = content
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^\*])\*(?!\*)(.+?)\*(?!\*)/g, '$1<em>$2</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.+<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .split(/\n\n+/).map(p => p.match(/<(h3|ul|ol|blockquote)/) ? p : `<p>${p.replace(/\n/g, '<br/>')}</p>`).join('');
  return <div dangerouslySetInnerHTML={{ __html: html }} />;
}

function VideoEmbed({ url }) {
  // Transform YouTube link → embed
  const yt = url.match(/(?:v=|\.be\/)([\w-]{6,})/);
  // Use youtube-nocookie domain — privacy-enhanced, more permissive referrer policy that
  // tolerates file:// origin better than the standard youtube.com embed.
  const src = yt ? `https://www.youtube-nocookie.com/embed/${yt[1]}?rel=0&modestbranding=1` : url;
  return (
    <div className="video-wrap">
      <iframe src={src} allowFullScreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" />
    </div>
  );
}

function PeerFeedforwardSlide({ slide, state, setResponse, markComplete }) {

  const [invites, setInvites] = useState(existing.invites);
  const cost = slide.interaction?.xcCostPerPeer || 10;
  const togglePeer = (peer) => {
    let next;
    if (invites.find(p => p.id === peer.id)) {
      next = invites.filter(p => p.id !== peer.id);
    } else {
      if (invites.length >= (slide.interaction?.maxPeers || 3)) return;
      next = [...invites, peer];
    }
    setInvites(next);
    setResponse(slide.id, { invites: next });
  };

  return (
    <div className="slide">
      <div className="slide-label">Peer Feedforward · Optional</div>
      <div className="slide-title">{slide.title}</div>
      <BodyBlocks blocks={slide.body} />
      <div className="interaction">
        <div className="interaction-label">Invite up to {slide.interaction?.maxPeers || 3} peers ({cost} XC each)</div>

          const invited = invites.find(p => p.id === peer.id);
          return (
            <div key={peer.id} className="peer-invite-row">
              <div className="peer-chip">
                <div className="peer-avatar">{peer.initials}</div>
                {peer.name} · <span style={{ color: 'var(--pflx-muted)', fontSize: 12 }}>{peer.studio}</span>

              <button className={invited ? 'action' : 'action ghost'} onClick={() => togglePeer(peer)}>

              </button>
            </div>
          );
        })}
        <div className="criterion-list">
          <div className="field-label" style={{ marginTop: 14 }}>Feedforward criteria peers will rate</div>
          {(slide.interaction?.criteria || []).map(c => (
            <div key={c.id} className="criterion">
              <strong>{c.label}</strong> <span style={{ color: 'var(--pflx-muted)', fontSize: 12 }}>· {c.scale}</span>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div className="xc-badge">{invites.length * cost} XC total</div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button className="action ghost" onClick={() => { setInvites([]); setResponse(slide.id, { invites: [] }); markComplete(slide.id); }}>
              Skip (Optional)

        </div>
      </div>
    </div>
  );

// ==========================================================================
// ACTIVITY: TIER LIST ENGINE
// ==========================================================================
function TierListEngineActivity({ slide, interaction, state, setResponse, markComplete }) {
  const existing = state.slideStates[slide.id]?.response;
  const tiers = interaction.tiers || ['S', 'A', 'B', 'C'];
  const tierKeys = tiers.map(t => t.split(' ')[0]);  // "S — I've got this" → "S"
  const initialPlacements = existing?.placements || Object.fromEntries(interaction.items.map(i => [i.id, null]));
  const [placements, setPlacements] = useState(initialPlacements);
  const [selectedItem, setSelectedItem] = useState(null);
  const [submitted, setSubmitted] = useState(existing?.submitted || false);

  const setItemTier = (itemId, tierKey) => {
    const next = { ...placements, [itemId]: tierKey };
    setPlacements(next);
    setResponse(slide.id, { placements: next, submitted });
    setSelectedItem(null);
  };

  const byTier = (tierKey) => interaction.items.filter(i => placements[i.id] === tierKey);
  const unplaced = interaction.items.filter(i => !placements[i.id]);
  const allPlaced = unplaced.length === 0;

  const submit = () => {
    setSubmitted(true);

function CohortConsensusReveal({ placements, items }) {
  return (
    <div className="companion-reveal">
      <div className="companion-reveal-label">Cohort Consensus</div>
      <div className="companion-reveal-title">Where the cohort lands</div>
      <div className="delta-table">
        {items.map(item => {
          const mine = placements[item.id] || '—';
          const cohort = mockTierListConsensus[item.id] || '—';
          const order = { S: 4, A: 3, B: 2, C: 1, '—': 0 };
          const delta = order[mine] - order[cohort];
          const cls = delta > 0 ? 'delta-up' : (delta === 0 ? 'delta-same' : 'delta-down');
          const symbol = delta > 0 ? `▲ +${delta}` : (delta === 0 ? '= aligned' : `▼ ${delta}`);
          return (
            <div key={item.id} className="delta-row">
              <div style={{ fontSize: 13 }}>{item.label}</div>
              <div style={{ fontFamily: 'Orbitron', fontWeight: 700, color: 'var(--pflx-cyan)' }}>You: {mine}</div>
              <div style={{ fontFamily: 'Orbitron', color: 'var(--pflx-muted)' }}>Cohort: {cohort}</div>
              <div className={cls}>{symbol}</div>
            </div>
          );
        })}
      </div>
      <div className="xbot-bubble">
        You're most aligned with the cohort on Color and Fundamentals — where they feel strong too. Your Layout read is one tier above the cohort; watch for why your confidence there may need a reality check during the Use Cases exercise.
      </div>
    </div>
  );
}

function BroadcastActivity({ slide, interaction, state, setResponse, markComplete }) {
  const existing = state.slideStates[slide.id]?.response || { cueResponses: {} };
  const [cueResponses, setCueResponses] = useState(existing.cueResponses);
  const [activeCue, setActiveCue] = useState(null);

  const setCueResponse = (cueId, resp) => {
    const next = { ...cueResponses, [cueId]: resp };
    setCueResponses(next);
    const allDone = interaction.cues.every(c => !!next[c.id]);
    setResponse(slide.id, { cueResponses: next, complete: allDone });
    if (allDone) markComplete(slide.id);
  };

  return (
    <div className="interaction">
      <div className="interaction-label">Broadcast · Video with cues</div>
      <VideoEmbed url={interaction.videoUrl} />
      <div className="broadcast-cue-list">
        {interaction.cues.map(cue => {
          const answered = !!cueResponses[cue.id];
          const expanded = activeCue === cue.id;
          return (
            <div key={cue.id} className="broadcast-cue">
              <div className="broadcast-cue-head">
                <div>
                  <span className="broadcast-cue-time">@ {formatTime(cue.atSeconds)}</span>
                  <span style={{ marginLeft: 12, fontFamily: 'Orbitron', fontSize: 12, color: 'var(--pflx-cyan)' }}>
                    {cue.activity.mode === 'cohortPulse' ? 'Cohort Pulse' : 'Thought Nebula'}
                  </span>
                </div>
                <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                  <span className={`broadcast-cue-status ${answered ? 'answered' : ''}`}>
                    {answered ? '✓ Answered' : 'Pending'}
                  </span>
                  <button className="action ghost" onClick={() => setActiveCue(expanded ? null : cue.id)}>
                    {expanded ? 'Close' : (answered ? 'Review' : 'Answer')}
                  </button>
                </div>
              </div>
              {expanded && (
                cue.activity.mode === 'cohortPulse'
                  ? <CohortPulseInline config={cue.activity}
                                        existing={cueResponses[cue.id]}
                                        onSubmit={r => setCueResponse(cue.id, r)} />
                  : <ThoughtNebulaInline config={cue.activity}
                                          existing={cueResponses[cue.id]}
                                          onSubmit={r => setCueResponse(cue.id, r)} />
              )}
            </div>
          );
        })}
      </div>
      {interaction.cues.every(c => cueResponses[c.id]) && (
        <div className="xbot-bubble">
          <strong>Recap.</strong> The cohort split evenly across purpose, with visual storytelling edging slightly ahead. Your nebula clustered around <em>communicate</em> and <em>simplify</em> — two halves of the same craft.
        </div>
      )}
    </div>
  );
}
function formatTime(s) { const m = Math.floor(s/60); const ss = String(s%60).padStart(2,'0'); return `${m}:${ss}`; }

function CohortPulseInline({ config, existing, onSubmit }) {

function ThoughtNebulaInline({ config, existing, onSubmit }) {
  const [words, setWords] = useState(existing?.words || []);
  const [draft, setDraft] = useState('');
  const [submitted, setSubmitted] = useState(!!existing);

  const addWord = () => {
    if (!draft.trim()) return;
    const next = [...words, draft.trim().toLowerCase()];
    setWords(next);
    setDraft('');
  };
  const submit = () => {
    if (words.length < (config.minWords || 1)) return;
    setSubmitted(true);
    onSubmit({ words });
  };

  const cohortWords = mockCohort.broadcastCues.c2.concat(words);
  const freq = {};
  cohortWords.forEach(w => freq[w] = (freq[w] || 0) + 1);

  return (
    <div>
      <div className="interaction-prompt" style={{ fontSize: 14 }}>{config.prompt}</div>
      {!submitted && (
        <div style={{ display: 'flex', gap: 8 }}>
          <input type="text" value={draft}
                 maxLength={config.maxCharsPerWord || 24}
                 placeholder="one word"
                 onChange={e => setDraft(e.target.value)}
                 onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), addWord())} />
          <button className="action ghost" onClick={addWord} disabled={words.length >= (config.maxWords || 3)}>+ Add</button>
        </div>
      )}
      <div style={{ display: 'flex', gap: 6, marginTop: 8, flexWrap: 'wrap' }}>
        {words.map((w, i) => (
          <span key={i} className="pill" style={{ color: 'var(--pflx-cyan)' }}>{w}</span>
        ))}
      </div>
      {!submitted && words.length >= (config.minWords || 1) && (
        <div style={{ marginTop: 10 }}>
          <button className="action" onClick={submit}>Launch into Nebula ▸</button>
        </div>
      )}
      {submitted && (
        <>
          <div className="nebula-words">
            {Object.entries(freq).sort((a,b) => b[1]-a[1]).map(([w, count], i) => {
              const mine = words.includes(w);
              const size = 14 + count * 6;
              return <span key={i} className="nebula-word"
                           style={{ fontSize: size, color: mine ? 'var(--pflx-cyan)' : 'var(--pflx-muted)' }}>
                {w}
              </span>;
            })}
          </div>
          {words.some(w => freq[w] >= (config.signalBonus?.coreThreshold || 3)) && (
            <div className="xbot-bubble">
              <strong>Signal Bonus earned.</strong> Your word landed in the core of the nebula — the cohort converges there. +{config.signalBonus?.xcReward || 2} XC.
            </div>
          )}
        </>
      )}
    </div>
  );
}

function WaypointActivity({ slide, interaction, state, setResponse, markComplete }) {
  const existing = state.slideStates[slide.id]?.response || { waypoints: [] };
  const [waypoints, setWaypoints] = useState(existing.waypoints);
  const [pendingPin, setPendingPin] = useState(null);
  const [pickerPos, setPickerPos] = useState(null);
  const [noteMode, setNoteMode] = useState(null);
  const canvasRef = useRef(null);

  const onCanvasClick = (e) => {
    if (pendingPin || noteMode) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    const newWp = { id: `wp-${Date.now()}`, x, y, tag: null, note: '' };
    setPendingPin(newWp);
    setPickerPos({ left: e.clientX - rect.left, top: e.clientY - rect.top });
  };
  const assignTag = (tag) => {
    const next = [...waypoints, { ...pendingPin, tag }];
    setWaypoints(next);
    setResponse(slide.id, { waypoints: next });
    setPendingPin(null);
    setPickerPos(null);
    setNoteMode(next[next.length - 1].id);
    if (next.length >= (interaction.minWaypoints || 5)) {
      markComplete(slide.id);
    }
  };
  const cancelPin = () => {
    setPendingPin(null);
    setPickerPos(null);
  };
  const setNote = (wpId, note) => {
    const next = waypoints.map(w => w.id === wpId ? { ...w, note } : w);
    setWaypoints(next);
    setResponse(slide.id, { waypoints: next });
  };

  const tagColors = { fundamentals: 'cyan', layout: 'green', typography: 'purple', color: 'magenta', images: 'amber' };

  return (
    <div className="interaction">
      <div className="interaction-label">Waypoint · Recon Mode · {waypoints.length}/{interaction.minWaypoints || 5} dropped</div>
      <div className="interaction-prompt">{interaction.prompt}</div>
      <div ref={canvasRef} className="waypoint-canvas" onClick={onCanvasClick}>
        <img src={interaction.imageUrl} alt={interaction.imageAlt || ''} />
        {waypoints.map((wp, i) => (
          <div key={wp.id}
               className={`waypoint-pin ${wp.tag || 'untagged'}`}
               style={{ left: `${wp.x*100}%`, top: `${wp.y*100}%` }}
               onClick={(e) => { e.stopPropagation(); setNoteMode(wp.id === noteMode ? null : wp.id); }}>
            {i+1}
          </div>
        ))}
        {pendingPin && pickerPos && (
          <div className="waypoint-tag-picker"
               style={{ left: `${pickerPos.left + 18}px`, top: `${pickerPos.top + 18}px` }}
               onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 11, color: 'var(--pflx-muted)', marginBottom: 4, fontFamily: 'Share Tech Mono', letterSpacing: '0.15em', textTransform: 'uppercase' }}>
              Tag concept
            </div>
            {(interaction.availableTags || []).map(tag => (
              <button key={tag.id} onClick={() => assignTag(tag.id)}>
                {tag.label}
              </button>
            ))}
            <button onClick={cancelPin} style={{ color: 'var(--pflx-amber)' }}>Cancel</button>
          </div>
        )}
      </div>
      <div className="waypoint-legend">
        {(interaction.availableTags || []).map(t => (
          <span key={t.id} className="waypoint-legend-item">
            <span className="waypoint-legend-dot" style={{ background: `var(--pflx-${tagColors[t.id]})` }} />
            {t.label}
          </span>
        ))}
      </div>
      {noteMode && (() => {
        const wp = waypoints.find(w => w.id === noteMode);
        if (!wp) return null;
        return (
          <div style={{ marginTop: 12, padding: 12, background: 'rgba(0,0,0,0.3)', borderRadius: 6 }}>
            <div className="field-label">Note for waypoint #{waypoints.indexOf(wp)+1} · {wp.tag}</div>
            <input type="text" value={wp.note} placeholder="What do you see at this spot?"
                   onChange={e => setNote(wp.id, e.target.value)} />
            <button className="action ghost" style={{ marginTop: 8 }} onClick={() => setNoteMode(null)}>Done</button>
          </div>
        );
      })()}
      {waypoints.length >= (interaction.minWaypoints || 5) && (
        <div className="xbot-bubble">
          Nice — you've tagged {waypoints.length} concepts in this design. {interaction.cohortOverlay ? 'Cohort heatmap overlay available in full viewer.' : ''}
        </div>
      )}
    </div>
  );
}

function DataCardsActivity({ slide, interaction, state, setResponse, markComplete }) {
  const cards = interaction.deck?.cards || [];

  useEffect(() => {
    if (Object.keys(viewed).length >= cards.length) {

// ==========================================================================
function PrototypePadActivity({ slide, interaction, state, setResponse, markComplete }) {
  const canvasRef = useRef(null);
  const [tool, setTool] = useState('pen');
  const [color, setColor] = useState('#00d4ff');
  const [drawing, setDrawing] = useState(false);
  const [last, setLast] = useState(null);
  const [saved, setSaved] = useState(state.slideStates[slide.id]?.response?.saved || false);
  const colors = ['#00d4ff', '#ff00ff', '#10e090', '#ffa500', '#ff4466', '#ffffff'];

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0c1220';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }, []);

  const start = (e) => {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const x = ((e.clientX || e.touches?.[0]?.clientX) - rect.left) * (canvas.width / rect.width);
    const y = ((e.clientY || e.touches?.[0]?.clientY) - rect.top) * (canvas.height / rect.height);
    setDrawing(true);
    setLast({ x, y });
  };
  const draw = (e) => {
    if (!drawing || !last) return;
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const x = ((e.clientX || e.touches?.[0]?.clientX) - rect.left) * (canvas.width / rect.width);
    const y = ((e.clientY || e.touches?.[0]?.clientY) - rect.top) * (canvas.height / rect.height);
    const ctx = canvas.getContext('2d');
    ctx.strokeStyle = tool === 'eraser' ? '#0c1220' : color;
    ctx.lineWidth = tool === 'eraser' ? 18 : (tool === 'highlighter' ? 12 : 3);
    ctx.globalAlpha = tool === 'highlighter' ? 0.35 : 1;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(last.x, last.y);
    ctx.lineTo(x, y);
    ctx.stroke();
    setLast({ x, y });
  };
  const end = () => { setDrawing(false); setLast(null); };

  const save = () => {
    const dataUrl = canvasRef.current.toDataURL('image/png');
    setSaved(true);
    setResponse(slide.id, { saved: true, dataUrl: dataUrl.slice(0, 200) + '…' /* truncate for state */ });
    markComplete(slide.id);
  };
  const clear = () => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0c1220';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  };

  return (
    <div className="interaction">
      <div className="interaction-label">Prototype Pad · Sketches save to Portfolio</div>
      <div className="interaction-prompt">{interaction.prompt}</div>
      <div className="proto-pad-shell">
        <canvas ref={canvasRef} width={800} height={380} className="proto-canvas"
                onMouseDown={start} onMouseMove={draw} onMouseUp={end} onMouseLeave={end}
                onTouchStart={start} onTouchMove={draw} onTouchEnd={end} />
        <div className="proto-toolbar">
          <button className={`proto-tool ${tool === 'pen' ? 'active' : ''}`} onClick={() => setTool('pen')}>Pen</button>
          <button className={`proto-tool ${tool === 'highlighter' ? 'active' : ''}`} onClick={() => setTool('highlighter')}>Highlighter</button>
          <button className={`proto-tool ${tool === 'eraser' ? 'active' : ''}`} onClick={() => setTool('eraser')}>Eraser</button>
          <div className="field-label" style={{ marginTop: 8 }}>Colors</div>
          <div className="proto-color-row">
            {colors.map(c => (
              <div key={c} className={`proto-color ${color === c ? 'active' : ''}`}
                   style={{ background: c, color: c }}
                   onClick={() => setColor(c)} />
            ))}
          </div>
          <button className="proto-tool" onClick={clear} style={{ marginTop: 8, color: 'var(--pflx-amber)' }}>
            Clear
          </button>
          <button className="action" onClick={save} style={{ marginTop: 6 }}>
            {saved ? '✓ Saved' : 'Save to Portfolio'}
          </button>
        </div>
      </div>
      <div style={{ fontSize: 12, color: 'var(--pflx-muted)', marginTop: 10 }}>
        Studio filter + PFLX stamp kit + brand-board canvas available in full viewer. X-Bot vision review fires on save.
      </div>
    </div>
  );
}

// ==========================================================================
// ACTIVITY: PITCH TAKE
// ==========================================================================
function PitchTakeActivity({ slide, interaction, state, setResponse, markComplete }) {
  const existing = state.slideStates[slide.id]?.response || { recording: false, recorded: false, seconds: 0 };
  const [recording, setRecording] = useState(existing.recording);
  const [recorded, setRecorded] = useState(existing.recorded);
  const [seconds, setSeconds] = useState(existing.seconds);

  useEffect(() => {
    if (!recording) return;
    const t = setInterval(() => setSeconds(s => s + 1), 1000);
    return () => clearInterval(t);
  }, [recording]);

  const start = () => { setRecording(true); setSeconds(0); };
  const stop = () => {
    setRecording(false);
    setRecorded(true);
    setResponse(slide.id, { recording: false, recorded: true, seconds });
    markComplete(slide.id);
  };

  return (
    <div className="interaction">
      <div className="interaction-label">Pitch Take · Records via PFLX Recording Studio</div>
      <div className="interaction-prompt">{interaction.prompt}</div>
      <div className="record-shell">
        <div className="record-shell-title">
          {recording ? '● Recording…' : (recorded ? '✓ Take complete' : 'Ready to record')}
        </div>
        <div className="record-shell-note">
          Max {Math.round((interaction.maxDurationSeconds || 360) / 60)} min.
          Auto-brands with your logo watermark + opening/closing slates from your brand board.
        </div>
        {!recorded && (
          <button className={`record-btn ${recording ? 'recording' : ''}`}
                  onClick={recording ? stop : start}>
            {recording ? <>
              <span className="record-dot" />
              Stop Recording · {formatTime(seconds)}
            </> : <>
              ● Start Pitch Take
            </>}
          </button>
        )}
        {recorded && (
          <>
            <div style={{ marginTop: 10, color: 'var(--pflx-green)', fontSize: 14 }}>
              Recorded {formatTime(seconds)} · Auto-branded and saved to Video Reel
            </div>
            <button className="action ghost" style={{ marginTop: 10 }} onClick={() => { setRecorded(false); setSeconds(0); }}>
              Re-record
            </button>
          </>
        )}
      </div>
      <div className="brand-preview">
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div className="brand-logo-dot" />
          <div>
            <div style={{ fontSize: 13, color: 'var(--pflx-cyan)' }}>Brand watermark</div>
            <div style={{ fontSize: 11, color: 'var(--pflx-muted)' }}>Pulled from your brand board</div>
          </div>
        </div>
        <span className="pill">AUTO</span>
      </div>
    </div>
  );
}

// ==========================================================================
// ACTIVITY: REFLECTION PROMPTS (with companionReveal tierListCompare)
// ==========================================================================
function ReflectionPromptsActivity({ slide, state, setResponse, markComplete }) {
  const interaction = slide.interaction;
  const prompts = interaction?.prompts || [];
  const existing = state.slideStates[slide.id]?.response || { answers: {} };
  const [answers, setAnswers] = useState(existing.answers);
  const [submitted, setSubmitted] = useState(existing.submitted || false);

  const setAnswer = (id, val) => {
    const next = { ...answers, [id]: val };
    setAnswers(next);
    setResponse(slide.id, { answers: next });
  };
  const submit = () => {
    const allAnswered = prompts.every(p => (answers[p.id] || '').trim().length >= 10);
    if (!allAnswered) return;
    setSubmitted(true);
    setResponse(slide.id, { answers, submitted: true });
    markComplete(slide.id);
  };

  // Look up the paired earlier slide response for companionReveal
  const companion = interaction?.companionReveal;
  const pairedResponse = companion
    ? state.slideStates[companion.comparesAgainstSlideId]?.response
    : null;

  return (
    <>
      <div className="interaction">
        <div className="interaction-label">Reflection Prompts · Save to Portfolio</div>
        {prompts.map(p => (
          <div key={p.id} className="submission-field">
            <div className="field-label">{p.focus ? `[${p.focus}] ` : ''}{p.prompt}</div>
            <textarea value={answers[p.id] || ''}
                      onChange={e => setAnswer(p.id, e.target.value)}
                      disabled={submitted}
                      placeholder="Think it through…" />
          </div>
        ))}
        {!submitted && (
          <button className="action" style={{ marginTop: 10 }}
                  onClick={submit}
                  disabled={prompts.some(p => (answers[p.id] || '').trim().length < 10)}>
            Save Reflection ▸
          </button>
        )}
      </div>

      {submitted && companion?.mode === 'tierListCompare' && pairedResponse?.placements && (
        <TierListCompareReveal mySlide3={pairedResponse.placements}
                                 pairedSlideId={companion.comparesAgainstSlideId} />
      )}
    </>
  );
}

function TierListCompareReveal({ mySlide3, pairedSlideId }) {
  // The viewer would typically prompt for a fresh ranking here. For MVP, simulate growth.
  // Simulate that players have shifted most items one tier higher as they learned.
  const bumpTier = t => ({ 'C': 'B', 'B': 'A', 'A': 'S', 'S': 'S' }[t] || t);
  const simulatedNow = Object.fromEntries(Object.entries(mySlide3).map(([k, v]) => [k, bumpTier(v)]));

  // Get the original items from slide-03
  const originalSlide = course.slides.find(s => s.id === pairedSlideId);
  const items = originalSlide?.interaction?.items || [];

  const tierGroups = (source) => {
    const grouped = {};
    items.forEach(it => {
      const t = source[it.id] || '—';
      grouped[t] = grouped[t] || [];
      grouped[t].push(it);
    });
    return grouped;
  };
  const before = tierGroups(mySlide3);
  const after = tierGroups(simulatedNow);
  const order = { S: 4, A: 3, B: 2, C: 1, '—': 0 };

  return (
    <div className="companion-reveal">
      <div className="companion-reveal-label">Companion Reveal · tierListCompare</div>
      <div className="companion-reveal-title">Your Growth Across the Five Concepts</div>
      <div className="compare-grid">
        <div className="compare-col">
          <div className="compare-col-label">Slide 3 · Before</div>
          {['S','A','B','C'].map(t => (
            <div key={t} className="mini-tier-row">
              <div className="mini-tier-label">{t}</div>
              <div className="mini-tier-items">{(before[t] || []).map(i => i.label.split('(')[0].trim()).join(' · ') || <em>—</em>}</div>
            </div>
          ))}
        </div>
        <div className="compare-arrow">▸</div>
        <div className="compare-col">
          <div className="compare-col-label">Slide 14 · Now</div>
          {['S','A','B','C'].map(t => (
            <div key={t} className="mini-tier-row">
              <div className="mini-tier-label">{t}</div>
              <div className="mini-tier-items">{(after[t] || []).map(i => i.label.split('(')[0].trim()).join(' · ') || <em>—</em>}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="delta-table">
        {items.map(item => {
          const b = mySlide3[item.id];
          const a = simulatedNow[item.id];
          const d = order[a] - order[b];
          const cls = d > 0 ? 'delta-up' : (d === 0 ? 'delta-same' : 'delta-down');
          return (
            <div key={item.id} className="delta-row">
              <div style={{ fontSize: 13 }}>{item.label}</div>
              <div style={{ fontFamily: 'Orbitron', color: 'var(--pflx-muted)' }}>{b} → {a}</div>
              <div></div>
              <div className={cls}>{d > 0 ? `▲ grew +${d}` : (d === 0 ? '= held' : `▼ ${d}`)}</div>
            </div>
          );
        })}
      </div>
      <div className="xbot-bubble">
        <strong>Growth Report.</strong> You moved up across every concept — strongest growth in the ones you started shakiest on. That's the right direction: the concepts you rated lowest at Slide 3 are the ones this course was built to lift. Signal Amplified.
      </div>
    </div>
  );
}
