<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphic Design Concepts — HOST DASHBOARD</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --pflx-cyan: #00d4ff;
      --pflx-teal: #00b8d4;
      --pflx-cyan-dim: rgba(0, 212, 255, 0.35);
      --pflx-cyan-faint: rgba(0, 212, 255, 0.12);
      --pflx-dark: #0a0e17;
      --pflx-darker: #050810;
      --pflx-panel: rgba(10, 14, 23, 0.85);
      --pflx-panel-solid: #0a0e17;
      --pflx-magenta: #ff00ff;
      --pflx-purple: #8b5cf6;
      --pflx-green: #10e090;
      --pflx-amber: #ffa500;
      --pflx-red: #ff4466;
      --pflx-text: #e0e6ef;
      --pflx-muted: #7a8ba0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--pflx-darker);
      color: var(--pflx-text);
      width: 100vw;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 15% 10%, rgba(255, 0, 255, 0.05), transparent 50%),
        radial-gradient(ellipse at 85% 80%, rgba(0, 212, 255, 0.05), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center;
      padding: 14px 32px;
      background: rgba(5, 8, 16, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--pflx-cyan-dim);
      gap: 18px;
    }
    .host-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      padding: 6px 12px;
      background: linear-gradient(135deg, var(--pflx-magenta), var(--pflx-purple));
      color: white;
      border-radius: 4px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .course-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.06em;
      color: var(--pflx-cyan);
      text-transform: uppercase;
      flex: 1;
    }
    .view-toggle {
      display: inline-flex;
      gap: 0;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--pflx-cyan-dim);
      border-radius: 4px;
      overflow: hidden;
    }
    .view-toggle a {
      padding: 8px 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--pflx-muted);
      text-decoration: none;
      text-transform: uppercase;
    }
    .view-toggle a.active { background: var(--pflx-cyan-faint); color: var(--pflx-cyan); }
    .view-toggle a:hover:not(.active) { color: var(--pflx-text); }

    /* ===== LAYOUT ===== */
    .dashboard {
      padding: 28px 32px 60px;
      position: relative;
      z-index: 1;
    }

    /* ===== STATS STRIP ===== */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      padding: 18px 20px;
      background: var(--pflx-panel);
      border: 1px solid var(--pflx-cyan-dim);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--pflx-cyan), transparent);
    }
    .stat-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--pflx-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--pflx-cyan);
      line-height: 1;
    }
    .stat-detail {
      margin-top: 6px;
      font-size: 12px;
      color: var(--pflx-muted);
    }
    .stat-card.alert { border-color: var(--pflx-amber); }
    .stat-card.alert .stat-value { color: var(--pflx-amber); }
    .stat-card.alert::before {
      background: linear-gradient(90deg, transparent, var(--pflx-amber), transparent);
    }
    .stat-card.good { border-color: var(--pflx-green); }
    .stat-card.good .stat-value { color: var(--pflx-green); }
    .stat-card.good::before {
      background: linear-gradient(90deg, transparent, var(--pflx-green), transparent);
    }

    /* ===== FILTERS ===== */
    .filter-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .filter-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--pflx-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .filter-chip {
      padding: 6px 12px;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      background: transparent;
      border: 1px solid var(--pflx-cyan-dim);
      color: var(--pflx-muted);
      border-radius: 14px;
      cursor: pointer;
      text-transform: uppercase;
    }
    .filter-chip:hover { color: var(--pflx-text); }
    .filter-chip.active { background: var(--pflx-cyan-faint); color: var(--pflx-cyan); border-color: var(--pflx-cyan); }

    /* ===== ROSTER TABLE ===== */
    .roster {
      background: var(--pflx-panel);
      border: 1px solid var(--pflx-cyan-dim);
      border-radius: 10px;
      overflow: hidden;
    }
    .roster-header {
      display: grid;
      grid-template-columns: 56px 2fr 1fr 1.2fr 120px 2.5fr 110px 110px;
      gap: 14px;
      padding: 12px 20px;
      background: rgba(0, 212, 255, 0.06);
      border-bottom: 1px solid var(--pflx-cyan-faint);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--pflx-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      align-items: center;
    }
    .roster-row {
      display: grid;
      grid-template-columns: 56px 2fr 1fr 1.2fr 120px 2.5fr 110px 110px;
      gap: 14px;
      padding: 14px 20px;
      align-items: center;
      border-bottom: 1px solid rgba(0, 212, 255, 0.06);
      cursor: pointer;
      transition: background 0.15s;
    }
    .roster-row:hover { background: var(--pflx-cyan-faint); }
    .roster-row.selected { background: rgba(0, 212, 255, 0.1); box-shadow: inset 3px 0 0 var(--pflx-cyan); }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: white;
      background: linear-gradient(135deg, var(--pflx-cyan), var(--pflx-purple));
    }
    .avatar.mindforge { background: linear-gradient(135deg, #ff4466, #ffa500); }
    .avatar.emagination { background: linear-gradient(135deg, #00d4ff, #8b5cf6); }
    .avatar.gentech { background: linear-gradient(135deg, #10e090, #00d4ff); }
    .avatar.innov8 { background: linear-gradient(135deg, #ff00ff, #ffa500); }

    .player-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--pflx-text);
    }
    .player-rank {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--pflx-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .studio-tag {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 0.15em;
      padding: 3px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      display: inline-block;
    }
    .studio-tag.mindforge { background: rgba(255, 68, 102, 0.12); color: #ff7590; border: 1px solid rgba(255, 68, 102, 0.3); }
    .studio-tag.emagination { background: rgba(0, 212, 255, 0.12); color: var(--pflx-cyan); border: 1px solid rgba(0, 212, 255, 0.3); }
    .studio-tag.gentech { background: rgba(16, 224, 144, 0.12); color: var(--pflx-green); border: 1px solid rgba(16, 224, 144, 0.3); }
    .studio-tag.innov8 { background: rgba(255, 0, 255, 0.12); color: #ff70ff; border: 1px solid rgba(255, 0, 255, 0.3); }

    .mini-progress {
      height: 6px;
      background: rgba(0, 212, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .mini-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--pflx-teal), var(--pflx-cyan));
      transition: width 0.4s;
    }
    .mini-progress-bar.complete { background: linear-gradient(90deg, var(--pflx-green), #0a9e64); }
    .mini-progress-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--pflx-text);
      margin-top: 4px;
    }

    .current-slide {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--pflx-cyan);
      letter-spacing: 0.1em;
    }

    .heatmap {
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      gap: 2px;
      min-width: 0;
    }
    .heat-cell {
      height: 14px;
      border-radius: 2px;
      background: rgba(0, 212, 255, 0.06);
      position: relative;
    }
    .heat-cell.complete { background: var(--pflx-green); }
    .heat-cell.current {
      background: var(--pflx-cyan);
      animation: pulse-heat 1.4s infinite;
    }
    .heat-cell.locked { background: rgba(122, 139, 160, 0.08); }
    @keyframes pulse-heat {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .last-active {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--pflx-muted);
      letter-spacing: 0.05em;
    }
    .status-chip {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      padding: 4px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      text-align: center;
      display: inline-block;
    }
    .status-chip.in-progress { background: rgba(0, 212, 255, 0.12); color: var(--pflx-cyan); border: 1px solid rgba(0, 212, 255, 0.3); }
    .status-chip.submitted { background: rgba(255, 165, 0, 0.12); color: var(--pflx-amber); border: 1px solid rgba(255, 165, 0, 0.3); }
    .status-chip.approved { background: rgba(16, 224, 144, 0.12); color: var(--pflx-green); border: 1px solid rgba(16, 224, 144, 0.3); }
    .status-chip.stuck { background: rgba(255, 68, 102, 0.12); color: var(--pflx-red); border: 1px solid rgba(255, 68, 102, 0.3); }
    .status-chip.not-started { background: rgba(122, 139, 160, 0.1); color: var(--pflx-muted); border: 1px solid rgba(122, 139, 160, 0.3); }

    /* ===== PLAYER DETAIL PANEL ===== */
    .detail-overlay {
      position: fixed;
      top: 0; right: 0;
      width: min(720px, 90vw);
      height: 100vh;
      background: var(--pflx-panel-solid);
      border-left: 1px solid var(--pflx-cyan);
      z-index: 200;
      overflow-y: auto;
      box-shadow: -12px 0 48px rgba(0, 0, 0, 0.7);
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .detail-overlay.visible { transform: translateX(0); }
    .detail-backdrop {
      position: fixed; inset: 0;
      background: rgba(5, 8, 16, 0.6);
      backdrop-filter: blur(4px);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .detail-backdrop.visible { opacity: 1; pointer-events: auto; }

    .detail-head {
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--pflx-cyan-faint);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 18px;
      align-items: center;
      position: sticky;
      top: 0;
      background: var(--pflx-panel-solid);
      z-index: 10;
    }
    .detail-close {
      background: transparent;
      border: 1px solid var(--pflx-cyan-dim);
      color: var(--pflx-muted);
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    .detail-close:hover { color: var(--pflx-cyan); border-color: var(--pflx-cyan); }
    .detail-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      color: var(--pflx-text);
      font-weight: 700;
    }
    .detail-meta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--pflx-muted);
      letter-spacing: 0.1em;
      margin-top: 4px;
    }
    .detail-big-avatar {
      width: 64px; height: 64px;
      font-size: 20px;
    }
    .detail-body {
      padding: 24px 32px 60px;
    }
    .detail-quick-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 28px;
    }
    .quick-stat {
      padding: 12px;
      background: rgba(0, 212, 255, 0.04);
      border: 1px solid var(--pflx-cyan-faint);
      border-radius: 6px;
    }
    .quick-stat-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--pflx-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .quick-stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      color: var(--pflx-cyan);
      font-weight: 700;
      margin-top: 4px;
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .action-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--pflx-cyan-dim);
      color: var(--pflx-text);
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
    }
    .action-btn:hover { background: var(--pflx-cyan-faint); color: var(--pflx-cyan); border-color: var(--pflx-cyan); }
    .action-btn.primary {
      background: linear-gradient(135deg, var(--pflx-teal), var(--pflx-cyan));
      color: var(--pflx-darker);
      border: 0;
      font-weight: 700;
    }
    .action-btn.warn {
      border-color: var(--pflx-amber);
      color: var(--pflx-amber);
    }

    .slide-block {
      margin-bottom: 20px;
      border: 1px solid var(--pflx-cyan-faint);
      border-radius: 8px;
      overflow: hidden;
    }
    .slide-block.complete { border-color: rgba(16, 224, 144, 0.35); }
    .slide-block.current { border-color: var(--pflx-cyan); }
    .slide-block.pending { opacity: 0.5; }
    .slide-block-head {
      padding: 10px 14px;
      background: rgba(0, 212, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .slide-block-number {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--pflx-muted);
      letter-spacing: 0.18em;
    }
    .slide-block-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      color: var(--pflx-cyan);
      font-weight: 600;
      letter-spacing: 0.05em;
      flex: 1;
      margin-left: 10px;
    }
    .slide-block-icon {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 1.5px solid var(--pflx-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
    }
    .slide-block.complete .slide-block-icon {
      background: var(--pflx-green);
      color: var(--pflx-darker);
      border-color: var(--pflx-green);
    }
    .slide-block.complete .slide-block-icon::after { content: '✓'; font-weight: bold; }
    .slide-block.current .slide-block-icon {
      background: var(--pflx-cyan-faint);
      border-color: var(--pflx-cyan);
    }
    .slide-block-body {
      padding: 14px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--pflx-text);
      background: rgba(0, 0, 0, 0.2);
    }
    .response-kv {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 12px 14px;
      font-size: 12px;
    }
    .response-k {
      font-family: 'Share Tech Mono', monospace;
      color: var(--pflx-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 10px;
      padding-top: 2px;
    }
    .response-v {
      color: var(--pflx-text);
    }
    .tier-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 8px;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid var(--pflx-cyan-faint);
      border-radius: 10px;
      font-size: 11px;
      margin-right: 6px;
      margin-bottom: 4px;
    }
    .tier-pill-letter {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 10px;
    }
    .tier-pill.S .tier-pill-letter { color: var(--pflx-cyan); }
    .tier-pill.A .tier-pill-letter { color: var(--pflx-green); }
    .tier-pill.B .tier-pill-letter { color: var(--pflx-amber); }
    .tier-pill.C .tier-pill-letter { color: var(--pflx-muted); }

    .signal-preview {
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.3);
      border-left: 2px solid var(--pflx-cyan);
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 6px;
    }
    .waypoint-preview {
      position: relative;
      width: 100%;
      border-radius: 6px;
      overflow: hidden;
      background: #0c1220;
      margin-top: 6px;
    }
    .waypoint-preview img { width: 100%; display: block; }
    .waypoint-preview .mini-pin {
      position: absolute;
      width: 18px; height: 18px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid white;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 9px;
      color: white;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
    }
    .mini-pin.fundamentals { background: var(--pflx-cyan); }
    .mini-pin.layout { background: var(--pflx-green); }
    .mini-pin.typography { background: var(--pflx-purple); }
    .mini-pin.color { background: var(--pflx-magenta); }
    .mini-pin.images { background: var(--pflx-amber); }

    .reflection-answer {
      padding: 10px 12px;
      background: rgba(139, 92, 246, 0.06);
      border-left: 2px solid var(--pflx-purple);
      border-radius: 4px;
      font-style: italic;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .reflection-answer::before {
      content: attr(data-focus);
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--pflx-purple);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-style: normal;
      margin-bottom: 4px;
    }

    .submission-card {
      padding: 12px;
      background: rgba(255, 165, 0, 0.06);
      border: 1px solid rgba(255, 165, 0, 0.3);
      border-radius: 6px;
    }
    .submission-row + .submission-row { margin-top: 10px; }
    .submission-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--pflx-amber);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .submission-body {
      font-size: 13px;
      line-height: 1.5;
    }

    .peer-invitations {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .peer-invitation {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: rgba(139, 92, 246, 0.08);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 18px;
      font-size: 12px;
    }
    .peer-invitation .mini-avatar {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pflx-purple), var(--pflx-cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 9px;
      color: white;
    }

    .empty-note {
      color: var(--pflx-muted);
      font-size: 12px;

// Build slideStates per player with realistic mock responses
function buildSlideStates(player) {
  const states = {};
  const allSlides = course.slides;
  for (let i = 0; i < allSlides.length; i++) {
    const slide = allSlides[i];
    const slideNumber = i + 1;  // 1-based
    const completed = slideNumber <= player.progressStage;
    if (!completed && slideNumber !== player.progressStage + 1) {
      states[slide.id] = { completed: false, response: null };
      continue;
    }
    // Generate mock response per slide type
    states[slide.id] = {
      completed,
      startedAt: '2026-04-20T14:15:00Z',
      completedAt: completed ? '2026-04-20T14:22:30Z' : null,
      response: completed ? mockResponseFor(slide, player) : null
    };
  }
  return states;
}

function mockResponseFor(slide, player) {
  const mode = slide.interaction?.mode;
  switch (slide.type) {
    case 'title':
    case 'overview':
    case 'why':
      return { viewed: true };
    case 'diagnostic': {
      if (mode === 'tierListEngine') {
        // Simulate each player placing the 5 concepts differently
        const options = ['S', 'A', 'B', 'C'];
        const placements = {};
        slide.interaction.items.forEach((item, idx) => {
          // Deterministic by player + item
          const seed = (player.initials.charCodeAt(0) + idx * 3) % 4;
          placements[item.id] = options[seed];
        });
        return { placements, submitted: true };
      }
      return { viewed: true };
    }
    case 'concept': {
      if (mode === 'broadcast') {
        return {
          cueResponses: {
            c1: { choice: ['a','b','c','d'][player.initials.charCodeAt(0) % 4] },
            c2: { words: pickWords(player, 2) }
          },
          complete: true
        };
      }
      return { viewed: true };
    }
    case 'connection': {
      if (mode === 'signalWall') {
        const signals = [
          "Noticed the new Apple airport signage — huge typographic restraint, all wayfinding leaning on color blocks. Felt calm in a place that's usually chaotic.",
          "A poster at a ramen shop near me used only two weights of one font. Whole identity came from the composition, not the decoration.",
          "The pharmacy I stopped at had a dispenser label where the dosage info was smaller than the warnings. Hierarchy doing its job.",
          "Saw a beer label yesterday where the whole design is illustration — no photo, no stock. Stood out on the shelf immediately.",
          "The Duolingo owl on the subway — the green is SO loud, and the expression does all the work. Design lesson: character > polish.",
          "My dentist's new sign has the logo the wrong size for the distance drivers approach from. Bad choice, but instructive.",
          "Spotted a zine in a bookstore — hand-drawn type, three colors, messy as hell, totally worked."
        ];
        const idx = player.initials.charCodeAt(0) % signals.length;
        return { posted: true, body: signals[idx], boosts: {} };
      }
      return { viewed: true };
    }
    case 'useCases': {
      if (mode === 'waypoint') {
        // 5 pins, roughly positioned across the image
        const pinSet = [
          [[0.22, 0.4, 'fundamentals'], [0.78, 0.35, 'color'], [0.45, 0.65, 'layout'], [0.65, 0.75, 'images'], [0.35, 0.15, 'typography']],
          [[0.15, 0.55, 'images'], [0.5, 0.3, 'color'], [0.72, 0.6, 'fundamentals'], [0.35, 0.7, 'layout'], [0.82, 0.42, 'typography']],
          [[0.4, 0.5, 'layout'], [0.6, 0.25, 'typography'], [0.2, 0.7, 'color'], [0.75, 0.55, 'images'], [0.55, 0.8, 'fundamentals']]
        ];
        const pins = pinSet[player.initials.charCodeAt(0) % pinSet.length];
        return {
          waypoints: pins.map((p, i) => ({
            id: `wp-${i}`, x: p[0], y: p[1], tag: p[2],
            note: i === 0 ? 'This is where the eye lands first.' : ''
          }))
        };
      }
      return { viewed: true };
    }
    case 'taskIntro':
      return { viewed: true, criteriaAcknowledged: true };
    case 'toolsTutorials': {
      if (mode === 'dataCards') {
        const viewed = {};
        const toolCards = slide.interaction.deck?.cards?.length || 8;
        // Different players viewed different numbers of cards
        const n = Math.max(1, Math.min(toolCards, (player.initials.charCodeAt(0) % toolCards) + 2));
        for (let i = 0; i < n; i++) viewed[i] = true;
        return { viewed, focus: n - 1, flipped: viewed };
      }
      return { viewed: true };
    }
    case 'taskSubmission': {
      return {
        submitted: true,
        fileName: `${player.initials.toLowerCase()}-graphic-design-final.mp4`,
        link: `https://example.com/${player.initials.toLowerCase()}/design-work`,
        description: descriptionFor(player)
      };
    }
    case 'peerFeedforward': {
      const pool = mockPlayers.filter(p => p.id !== player.id);
      const invitedCount = (player.initials.charCodeAt(0) % 3);
      const invites = pool.slice(0, invitedCount).map(p => ({
        id: p.id, name: p.name, initials: p.initials, studio: p.studio
      }));
      return { invites };
    }
    case 'refine': {
      return { saved: true, summary: 'Sketched adjustments to composition + color palette' };
    }
    case 'branding': {
      return {
        recorded: true,
        seconds: 180 + (player.initials.charCodeAt(0) % 120),
        label: 'Final Branded Pitch'
      };
    }
    case 'reflection': {
      return {
        submitted: true,
        answers: {
          r1: reflectionAnswer(player, 'work'),
          r2: reflectionAnswer(player, 'process'),
          r3: reflectionAnswer(player, 'self')
        }
      };
    }
    case 'completion':
      return { viewed: true };
    default:
      return { viewed: true };
  }
}

function pickWords(player, n) {
  const pool = ['communicate', 'solve', 'simplify', 'show', 'emote', 'sell', 'identify', 'inspire', 'translate', 'evoke', 'focus'];
  const seed = player.initials.charCodeAt(0);
  return Array.from({ length: n }, (_, i) => pool[(seed + i * 3) % pool.length]);
}

function descriptionFor(player) {
  const templates = [
    "I built a poster for a local independent bookstore. Fundamentals: strong diagonal linework guides the eye to the title. Layout: grid-based with intentional negative space on the left. Typography: Fraunces headline paired with IBM Plex Sans body — opposing fonts. Color: muted palette of terracotta + cream + deep teal for warmth and stability. Images: high-contrast photo of an open book with strong shadow.",
    "Created a brand identity for a sustainable coffee roaster. The line work in the mark evokes steam rising (fundamentals). Composition centers the wordmark with orbiting leaf marks (layout). Typography pairs a condensed display with a warm serif (opposition). The palette is earth-toned greens and browns for the tone. Illustrated imagery replaces photography to stay distinctive on a crowded shelf.",
    "Designed an album cover. Line and shape drive the visual — bold curved forms in overlap. Composition uses rule of thirds with the main subject in the lower left. Typography is a single display weight at large scale. Color is a complementary purple-yellow palette for emotional energy. The central image is a symbolic silhouette that carries the mood.",
    "Made a movie poster for an indie horror short. Balance is asymmetric and intentionally unsettling. Layout: the title is pushed to the bottom while the character's face dominates the upper half. Typography: condensed sans for tension. Color: red and black with cool gray accents — high contrast. Image: high-grain photograph with selective color isolation.",
    "I designed a restaurant menu. Texture comes from paper stock and letterforms. Layout uses two columns with consistent dish hierarchy. Typography: Playfair Display for dish names, Inter for descriptions — a classic pairing. Color: cream background, charcoal text, a single accent color for chef specials. Images: small black-and-white dish illustrations instead of photos, which felt more intimate."
  ];
  return templates[player.initials.charCodeAt(0) % templates.length];
}

function reflectionAnswer(player, focus) {
  const byFocus = {
    work: [
      "The layout. I kept simplifying until it felt intentional — every element had to earn its place.",
      "Most proud of my color choices. I was scared to commit to a real palette and I pushed through.",
      "The typography pairing. I almost defaulted to what felt safe and caught myself.",
      "The overall restraint. I used to think more = better and this course killed that instinct.",
      "How the five concepts reinforce each other. Each choice clicks into the others."
    ],
    process: [
      "I iterate too slowly. The peer feedforward was a bigger unlock than I expected — it got me unstuck.",
      "Starting with the concept video first before touching any tools paid off. I wasted less.",
      "I spent too long on color and not enough on layout. Next time I'll start with composition sketches.",
      "Prototype Pad made me actually sketch before designing. Usually I open Photoshop and wing it.",
      "Sequential mode forced me to actually finish each activity instead of skipping around."
    ],
    self: [
      "I'm a thinker who needs a deadline. Without structure I wander; with it I ship.",
      "A designer who cares about meaning more than polish. That's either a strength or a trap.",
      "A maker who doesn't trust simplicity yet. I keep adding decoration I don't need.",
      "Someone who can see a brand system, not just a piece. I want to keep building at that level.",
      "A beginner. That word used to feel like a put-down — now it feels like permission."
    ]
  };
  return byFocus[focus][player.initials.charCodeAt(0) % byFocus[focus].length];
}

          </div>
        )}

        <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 10, color: 'var(--pflx-muted)', letterSpacing: '0.2em', textTransform: 'uppercase', marginBottom: 12 }}>
          Slide-by-Slide Responses
        </div>

        {course.slides.map((slide, i) => (
          <SlideResponseBlock key={slide.id}
                              slide={slide}
                              slideNumber={i + 1}
                              state={player.slideStates[slide.id]}
                              isCurrent={i === player.progressStage && player.status !== 'approved'} />
        ))}

        {player.progressStage === course.slides.length && player.status === 'approved' && (
          <div className="xbot-note">
            <strong>Approved {player.lastActive}.</strong> Badges granted, XC paid, cohort Lineage Gallery updated. This player's work is now surfaced to hosts on other pathways looking for design talent.
          </div>
        )}
      </div>
    </>
  );
}

function SlideResponseBlock({ slide, slideNumber, state, isCurrent }) {
  const completed = state?.completed;
  const cls = completed ? 'complete' : (isCurrent ? 'current' : 'pending');
  return (
    <div className={`slide-block ${cls}`}>
      <div className="slide-block-head">
        <span className="slide-block-number">SLIDE {String(slideNumber).padStart(2,'0')}</span>
        <span className="slide-block-title">{slide.title}</span>
        <span className="slide-block-icon" />
      </div>
      <div className="slide-block-body">
        {!completed && !isCurrent && <div className="empty-note">Not reached yet.</div>}
        {!completed && isCurrent && <div className="empty-note">Currently here. No response yet.</div>}
        {completed && <ResponseRenderer slide={slide} response={state.response} />}
      </div>
    </div>
  );
}

// Renders the player's response for any slide type
function ResponseRenderer({ slide, response }) {
  const mode = slide.interaction?.mode;

  if (!response) return <div className="empty-note">No response recorded.</div>;

  if (slide.type === 'title' || slide.type === 'overview' || slide.type === 'why' ||
      slide.type === 'taskIntro' || slide.type === 'completion') {
    return <div className="empty-note">Viewed — no input for this slide type.</div>;
  }

  if (mode === 'tierListEngine') {
    const tiers = { S: [], A: [], B: [], C: [] };
    slide.interaction.items.forEach(item => {
      const t = response.placements?.[item.id];
      if (t && tiers[t]) tiers[t].push(item);
    });
    return (
      <div>
        <div className="response-k" style={{ marginBottom: 6 }}>Tier placements</div>
        {['S','A','B','C'].map(t => (
          <div key={t} style={{ marginBottom: 6 }}>
            <span className={`tier-pill ${t}`}>
              <span className="tier-pill-letter">{t}</span>
              {tiers[t].length === 0 && <span style={{ color: 'var(--pflx-muted)', fontSize: 11 }}>empty</span>}
              {tiers[t].map(it => <span key={it.id} style={{ fontSize: 11 }}> {it.label.split('(')[0].trim()}</span>)}
            </span>
          </div>
        ))}
      </div>
    );
  }

  if (mode === 'broadcast') {
    const cr = response.cueResponses || {};
    return (
      <div className="response-kv">
        <div className="response-k">Cue 1 (Pulse)</div>
        <div className="response-v">
          Picked: <strong>{cr.c1?.choice?.toUpperCase() || '—'}</strong>
        </div>
        <div className="response-k">Cue 2 (Nebula)</div>
        <div className="response-v">
          Words: {cr.c2?.words?.map((w, i) => <span key={i} className="tier-pill">{w}</span>)}
        </div>
      </div>
    );
  }

  if (mode === 'signalWall') {
    return (
      <div>
        <div className="response-k" style={{ marginBottom: 4 }}>Posted Signal</div>
        <div className="signal-preview">{response.body}</div>
      </div>
    );
  }

  if (mode === 'waypoint') {
    const wps = response.waypoints || [];
    return (
      <div>
        <div className="response-k" style={{ marginBottom: 6 }}>Dropped {wps.length} waypoints</div>
        <div className="waypoint-preview">
          <img src="./background.png" alt="Waypoint canvas" />
          {wps.map((wp, i) => (
            <div key={i} className={`mini-pin ${wp.tag || 'images'}`}
                 style={{ left: `${wp.x*100}%`, top: `${wp.y*100}%` }}>
              {i+1}
            </div>
          ))}
        </div>
        <div style={{ marginTop: 8, fontSize: 11, color: 'var(--pflx-muted)' }}>
          {wps.map((wp, i) => (
            <span key={i} style={{ marginRight: 14 }}>
              #{i+1}: <strong style={{ color: `var(--pflx-${{
                fundamentals: 'cyan', layout: 'green', typography: 'purple', color: 'magenta', images: 'amber'
              }[wp.tag] || 'muted'})` }}>{wp.tag}</strong>
            </span>
          ))}
        </div>
      </div>
    );
  }

  if (mode === 'dataCards') {
    const cards = slide.interaction.deck?.cards || [];
    const viewedCount = Object.keys(response.viewed || {}).length;
    return (
      <div className="response-kv">
        <div className="response-k">Reviewed</div>
        <div className="response-v">{viewedCount} of {cards.length} tools</div>
        <div className="response-k">Last focused</div>
        <div className="response-v">{cards[response.focus]?.front || '—'}</div>
      </div>
    );
  }

  if (slide.type === 'taskSubmission') {
    return (
      <div className="submission-card">
        <div className="submission-row">
          <div className="submission-label">File</div>
          <div className="submission-body">📎 {response.fileName}</div>
        </div>
        {response.link && (
          <div className="submission-row">
            <div className="submission-label">Link</div>
            <div className="submission-body">
              <a href={response.link} target="_blank" rel="noreferrer" style={{ color: 'var(--pflx-cyan)' }}>
                {response.link}
              </a>
            </div>
          </div>
        )}
        <div className="submission-row">
          <div className="submission-label">Description</div>
          <div className="submission-body">{response.description}</div>
        </div>
      </div>
    );
  }

  if (mode === 'peerFeedforward') {
    const invites = response.invites || [];
    if (invites.length === 0) return <div className="empty-note">Skipped (optional).</div>;
    return (
      <div>
        <div className="response-k" style={{ marginBottom: 6 }}>
          Invited {invites.length} peer{invites.length === 1 ? '' : 's'} ({invites.length * 10} XC)
        </div>
        <div className="peer-invitations">
          {invites.map(p => (
            <span key={p.id} className="peer-invitation">
              <span className="mini-avatar">{p.initials}</span>
              {p.name}
            </span>
          ))}
        </div>
      </div>
    );
  }

  if (slide.type === 'refine') {
    return (
      <div>
        <div className="response-k" style={{ marginBottom: 6 }}>Prototype Pad sketch</div>
        <div className="proto-thumb" />
        <div style={{ fontSize: 12, color: 'var(--pflx-muted)', marginTop: 6 }}>{response.summary}</div>
      </div>
    );
  }

  if (mode === 'pitchTake') {
    const m = Math.floor(response.seconds / 60);
    const s = String(response.seconds % 60).padStart(2, '0');
    return (
      <div className="pitch-preview">
        <div className="pitch-play">▶</div>
        <div>
          <div style={{ fontWeight: 600 }}>{response.label}</div>
          <div className="pitch-duration">{m}:{s} · Auto-branded</div>
        </div>
      </div>
    );
  }

  if (mode === 'reflectionPrompts') {
    return (
      <div>
        {slide.interaction.prompts.map(p => (
          <div key={p.id} className="reflection-answer" data-focus={p.focus}>
            {response.answers?.[p.id] || <em>—</em>}
          </div>
        ))}
      </div>
    );
  }

  return <div className="empty-note">Response recorded (type: {mode || slide.type}).</div>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<HostDashboard />);
  </script>
</body>
</html>
