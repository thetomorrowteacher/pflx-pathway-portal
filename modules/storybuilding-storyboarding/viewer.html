<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storybuilding & Storyboarding — PFLX Module</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cyan:#00d4ff; --purple:#8b5cf6; --amber:#ffa500; --green:#10e090;
    --dark:#0a0e17; --darker:#050810; --panel:rgba(13,18,30,0.92);
    --line:rgba(0,212,255,0.18); --text:#e0e6ef; --muted:#7a8ba0; --red:#ff4466;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Rajdhani',sans-serif;background:var(--darker);color:var(--text);
    overflow:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(900px 500px at 12% -5%,rgba(0,212,255,0.10),transparent 70%),
      radial-gradient(900px 600px at 105% 110%,rgba(139,92,246,0.10),transparent 70%);
  }
  #app{position:relative;z-index:1;display:flex;height:100vh}

  /* ---- phase rail ---- */
  .rail{
    width:248px;flex-shrink:0;background:var(--panel);
    border-right:1px solid var(--line);display:flex;flex-direction:column;
  }
  .rail-head{padding:20px 18px 14px;border-bottom:1px solid var(--line)}
  .rail-kicker{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2.5px;color:var(--cyan);opacity:.8}
  .rail-title{font-size:19px;font-weight:700;line-height:1.15;margin-top:6px}
  .rail-sub{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.4}
  .progress-wrap{padding:14px 18px;border-bottom:1px solid var(--line)}
  .progress-bar{height:6px;border-radius:3px;background:rgba(255,255,255,0.07);overflow:hidden}
  .progress-fill{height:100%;width:0;border-radius:3px;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width .4s}
  .progress-label{font-size:11px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between}
  .phases{flex:1;overflow-y:auto;padding:10px}
  .phase-item{
    display:flex;gap:11px;align-items:flex-start;padding:12px 11px;border-radius:10px;
    cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:.15s;
  }
  .phase-item:hover{background:rgba(255,255,255,0.03)}
  .phase-item.active{background:rgba(0,212,255,0.08);border-color:var(--line)}
  .phase-item.locked{opacity:.4;cursor:not-allowed}
  .phase-dot{
    width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;
    align-items:center;justify-content:center;font-size:12px;font-weight:700;
    border:2px solid var(--strand);color:var(--strand);
  }
  .phase-item.done .phase-dot{background:var(--strand);color:var(--darker)}
  .phase-meta{flex:1;min-width:0}
  .phase-strand{font-family:'Orbitron',sans-serif;font-size:8.5px;letter-spacing:1.5px;color:var(--strand)}
  .phase-name{font-size:14px;font-weight:600;line-height:1.2;margin-top:2px}
  .rail-foot{padding:12px 18px;border-top:1px solid var(--line);font-size:10px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .save-dot{display:flex;align-items:center;gap:6px}
  .save-dot i{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
  .save-dot.saving i{background:var(--amber)}

  /* ---- main ---- */
  .main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
  .stage{max-width:780px;width:100%;margin:0 auto;padding:34px 38px 60px}
  .stage-hero{display:block;width:100%;height:auto;margin:0 0 22px;border:0;border-radius:0;background:transparent}
  .phase-header{border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:24px}
  .ph-strand{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:var(--strand)}
  .ph-title{font-size:30px;font-weight:700;line-height:1.1;margin-top:6px}
  .obj-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .obj-chip{
    font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;
    padding:4px 9px;border-radius:5px;background:rgba(0,212,255,0.10);
    border:1px solid var(--line);color:var(--cyan);cursor:help;
  }
  .eq{
    margin-top:14px;padding:13px 15px;border-left:3px solid var(--strand);
    background:rgba(255,255,255,0.025);border-radius:0 8px 8px 0;
  }
  .eq-label{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:var(--muted)}
  .eq p{font-size:15px;font-style:italic;margin-top:5px;color:#cfd8e6}

  /* blocks */
  .block{margin-bottom:20px}
  .md h2{font-size:22px;font-weight:700;margin:4px 0 10px}
  .md h3{font-size:17px;font-weight:600;margin:14px 0 7px;color:var(--cyan)}
  .md p{font-size:15.5px;line-height:1.7;margin:8px 0;color:#d4dce8}
  .md ul{margin:8px 0 8px 4px;list-style:none}
  .md li{font-size:15px;line-height:1.65;margin:6px 0;padding-left:18px;position:relative;color:#d4dce8}
  .md li::before{content:'▸';position:absolute;left:0;color:var(--cyan)}
  .md strong{color:#fff;font-weight:700}
  .callout{padding:13px 16px;border-radius:9px;font-size:14px;line-height:1.6;border:1px solid}
  .callout.info{background:rgba(0,212,255,0.07);border-color:var(--line);color:#bfe6f2}
  .callout.success{background:rgba(16,224,144,0.08);border-color:rgba(16,224,144,0.3);color:#bff0d8}
  .callout.warn{background:rgba(255,165,0,0.08);border-color:rgba(255,165,0,0.3);color:#f0dcb8}
  .video-embed{position:relative;padding-bottom:56.25%;height:0;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
  .video-embed iframe{position:absolute;inset:0;width:100%;height:100%}
  .vid-cap{font-size:13px;color:var(--muted);margin-top:6px}

  /* tool card */
  .tool-card{
    display:flex;gap:14px;align-items:center;padding:15px 16px;border-radius:11px;
    background:rgba(139,92,246,0.07);border:1px solid rgba(139,92,246,0.28);
  }
  .tool-ic{font-size:30px}
  .tool-body{flex:1}
  .tool-name{font-size:16px;font-weight:700}
  .tool-tag{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;color:var(--purple);margin-left:8px}
  .tool-desc{font-size:13.5px;color:#c4cee0;line-height:1.55;margin-top:3px}
  .tool-note{font-size:12px;color:var(--muted);margin-top:5px;font-style:italic}

  /* interactive task */
  .task{
    border:1px solid var(--line);border-radius:12px;padding:18px;background:rgba(255,255,255,0.022);
  }
  .task.done{border-color:rgba(16,224,144,0.4);background:rgba(16,224,144,0.04)}
  .task-head{display:flex;align-items:center;gap:9px;margin-bottom:4px}
  .task-badge{font-family:'Orbitron',sans-serif;font-size:8.5px;letter-spacing:1.5px;padding:3px 7px;border-radius:4px;background:rgba(0,212,255,0.12);color:var(--cyan)}
  .task.done .task-badge{background:rgba(16,224,144,0.18);color:var(--green)}
  .task-title{font-size:17px;font-weight:700}
  .task-instr{font-size:14px;color:#c4cee0;line-height:1.6;margin:6px 0 12px}
  .field{margin-bottom:11px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--cyan);margin-bottom:4px;letter-spacing:.3px}
  .field input,.field textarea{
    width:100%;background:rgba(5,8,16,0.7);border:1px solid var(--line);border-radius:8px;
    color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14.5px;padding:9px 11px;resize:vertical;
  }
  .field textarea{min-height:74px}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--cyan)}

  /* diagnostic */
  .dx-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
  .dx-label{flex:1;font-size:14.5px;font-weight:600}
  .dx-scale{display:flex;gap:5px;flex-wrap:wrap}
  .dx-opt{
    font-size:11px;padding:5px 9px;border-radius:6px;cursor:pointer;
    background:rgba(255,255,255,0.04);border:1px solid var(--line);color:var(--muted);transition:.12s;
  }
  .dx-opt:hover{border-color:var(--cyan)}
  .dx-opt.sel{background:var(--cyan);color:var(--darker);border-color:var(--cyan);font-weight:700}

  .btn{
    font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1.5px;font-weight:700;
    padding:11px 20px;border-radius:9px;border:1px solid var(--cyan);background:rgba(0,212,255,0.12);
    color:var(--cyan);cursor:pointer;transition:.15s;
  }
  .btn:hover:not(:disabled){background:var(--cyan);color:var(--darker)}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn.solid{background:var(--cyan);color:var(--darker)}
  .btn.green{border-color:var(--green);background:var(--green);color:var(--darker)}
  .btn.ghost{background:transparent;border-color:var(--line);color:var(--muted)}
  .task-foot{margin-top:10px;display:flex;align-items:center;gap:12px}
  .done-tag{font-size:12px;color:var(--green);font-weight:700;display:flex;align-items:center;gap:5px}

  .nav-row{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:30px;padding-top:20px;border-top:1px solid var(--line);
  }
  .gate-note{font-size:13px;color:var(--muted)}
  .gate-note.ok{color:var(--green)}
  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--panel);border:1px solid var(--cyan);border-radius:10px;
    padding:11px 20px;font-size:13px;z-index:50;transition:transform .35s;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  .pill{
    display:inline-block;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1.5px;
    padding:4px 10px;border-radius:5px;background:rgba(16,224,144,0.14);color:var(--green);
    border:1px solid rgba(16,224,144,0.35);
  }
  .seg-label{
    font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2.5px;color:var(--strand);
    margin:26px 0 4px;padding-top:14px;border-top:1px dashed var(--line);
  }
  .seg-label:first-child{border-top:none;padding-top:0;margin-top:6px}
  @media(max-width:720px){
    .rail{display:none}
    .stage{padding:24px 20px 60px}
  }
</style>

  function loadStandalone(){
    if(embedded) return;
    try {
      var raw = localStorage.getItem(SAVE_KEY);
      if(raw){ var s = JSON.parse(raw); if(s && s.blocks) state = s; }
    } catch(e){}
  }

  /* ---- block helpers ---- */
  function phaseBlocks(phase){
    if(phase.segments){
      var out = [];
      phase.segments.forEach(function(seg){
        seg.blocks.forEach(function(b){ out.push({ block:b, segment:seg }); });
      });
      return out;
    }
    return phase.blocks.map(function(b){ return { block:b, segment:null }; });
  }
  function isCompletable(b){ return b.kind==='diagnostic'||b.kind==='activity'||b.kind==='reflection'||b.kind==='submission'; }
  function blockState(id){ if(!state.blocks[id]) state.blocks[id] = {}; return state.blocks[id]; }
  function isBlockDone(id){ return !!(state.blocks[id] && state.blocks[id].done); }

  function phaseCompletables(phase){
    return phaseBlocks(phase).map(function(x){return x.block;}).filter(isCompletable);
  }
  function isPhaseComplete(idx){
    var cs = phaseCompletables(PHASES[idx]);
    if(!cs.length) return true;
    return cs.every(function(b){ return isBlockDone(b.id); });
  }
  function allCompletables(){
    var n = 0; PHASES.forEach(function(p){ n += phaseCompletables(p).length; }); return n;
  }
  function doneCompletables(){
    var n = 0;
    PHASES.forEach(function(p){ phaseCompletables(p).forEach(function(b){ if(isBlockDone(b.id)) n++; }); });
    return n;
  }
  function progressPercent(){
    var t = allCompletables(); return t ? Math.round(doneCompletables()/t*100) : 0;
  }

  /* ---- persistence ---- */
  var saveTimer = null, saveDotEl = null;
  function flagSaving(on){
    if(saveDotEl) saveDotEl.className = 'save-dot' + (on?' saving':'');
  }
  function persist(){
    flagSaving(true);
    if(!embedded){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(e){} }
    postToNode('pflx_mod_save', { state: state });
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){ flagSaving(false); }, 500);
    postToNode('pflx_mod_progress', { percent: progressPercent() });
  }

  /* ---- markdown mini-parser ---- */
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function inline(s){
    return esc(s)
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g,'<em>$1</em>');
  }
  function renderMarkdown(src){
    var lines = (src||'').split('\n'), html = '', list = [];
    function flush(){ if(list.length){ html += '<ul>'+list.join('')+'</ul>'; list = []; } }
    lines.forEach(function(ln){
      if(/^### /.test(ln)){ flush(); html += '<h3>'+inline(ln.slice(4))+'</h3>'; }
      else if(/^## /.test(ln)){ flush(); html += '<h2>'+inline(ln.slice(3))+'</h2>'; }
      else if(/^- /.test(ln)){ list.push('<li>'+inline(ln.slice(2))+'</li>'); }
      else if(ln.trim()===''){ flush(); }
      else { flush(); html += '<p>'+inline(ln)+'</p>'; }
    });
    flush();
    return '<div class="md">'+html+'</div>';
  }

  /* ---- toast ---- */
  function toast(msg){
    var t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function(){ t.classList.add('show'); }, 12);
    setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ t.remove(); }, 400); }, 2600);
  }

  /* ============ RENDER ============ */
  var app = document.getElementById('app');

  function render(){
    var phase = PHASES[state.currentPhase];
    app.innerHTML = '';
    app.appendChild(renderRail());
    var main = document.createElement('div');
    main.className = 'main';
    main.appendChild(renderStage(phase));
    app.appendChild(main);
  }

  function renderRail(){
    var rail = document.createElement('div');
    rail.className = 'rail';
    var pct = progressPercent();
    var phaseHtml = PHASES.map(function(p, i){
      var done = isPhaseComplete(i);
      var locked = i > 0 && !isPhaseComplete(i-1);
      var active = i === state.currentPhase;
      var cls = 'phase-item' + (active?' active':'') + (done?' done':'') + (locked?' locked':'');
      return '<div class="'+cls+'" data-phase="'+i+'" style="--strand:'+STRAND[p.kind]+'">'
        + '<div class="phase-dot">'+(done?'✓':(i+1))+'</div>'
        + '<div class="phase-meta"><div class="phase-strand">'+p.kind.toUpperCase()+'</div>'
        + '<div class="phase-name">'+esc(p.title)+'</div></div></div>';
    }).join('');
    rail.innerHTML =
      '<div class="rail-head">'
      + '<div class="rail-kicker">PFLX MODULE · COURSE</div>'
      + '<div class="rail-title">'+esc(MANIFEST.name)+'</div>'
      + '<div class="rail-sub">'+esc(MANIFEST.subtitle||'')+'</div></div>'
      + '<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
      + '<div class="progress-label"><span>FLX progress</span><span>'+pct+'%</span></div></div>'
      + '<div class="phases">'+phaseHtml+'</div>'
      + '<div class="rail-foot"><div class="save-dot"><i></i> '+(embedded?'Synced':'Saved')+'</div>'
      + '<span>'+(embedded?'In Node':'Standalone')+'</span></div>';
    saveDotEl = rail.querySelector('.save-dot');
    rail.querySelectorAll('.phase-item').forEach(function(el){
      el.addEventListener('click', function(){
        var i = +el.getAttribute('data-phase');
        if(i>0 && !isPhaseComplete(i-1)){ toast('Finish the previous phase first.'); return; }
        state.currentPhase = i; persist(); render();
      });
    });
    return rail;
  }

  function renderStage(phase){
    var stage = document.createElement('div');
    stage.className = 'stage';
    stage.style.setProperty('--strand', STRAND[phase.kind]);

    /* hero banner — module-level title art, shown above every phase */
    var hero = document.createElement('img');
    hero.className = 'stage-hero';
    hero.src = 'assets/title.png';
    hero.alt = MANIFEST.name || '';
    stage.appendChild(hero);

    /* header */
    var objChips = (phase.flxObjectives||[]).map(function(code){
      return '<span class="obj-chip" title="'+esc(OBJ[code]||code)+'">'+code+'</span>';
    }).join('');
    var eq = '';
    if(phase.desiredResults && phase.desiredResults.essentialQuestions){
      eq = '<div class="eq"><div class="eq-label">ESSENTIAL QUESTIONS</div>'
        + phase.desiredResults.essentialQuestions.map(function(q){ return '<p>'+esc(q)+'</p>'; }).join('')
        + '</div>';
    }
    var header = document.createElement('div');
    header.className = 'phase-header';
    header.innerHTML = '<div class="ph-strand">'+phase.kind.toUpperCase()+' &middot; FLX STRAND '+(state.currentPhase+1)+' OF 4</div>'
      + '<div class="ph-title">'+esc(phase.title)+'</div>'
      + '<div class="obj-row">'+objChips+'</div>' + eq;
    stage.appendChild(header);

    /* blocks */
    var lastSeg = null;
    phaseBlocks(phase).forEach(function(x){
      if(x.segment && x.segment !== lastSeg){
        lastSeg = x.segment;
        var sl = document.createElement('div');
        sl.className = 'seg-label';
        sl.textContent = x.segment.title;
        stage.appendChild(sl);
      }
      stage.appendChild(renderBlock(x.block));
    });

    /* nav */
    stage.appendChild(renderNav(phase));
    return stage;
  }

  function renderBlock(b){
    var wrap = document.createElement('div');
    wrap.className = 'block';
    switch(b.kind){
      case 'markdown': wrap.innerHTML = renderMarkdown(b.content); break;
      case 'callout':
        wrap.innerHTML = '<div class="callout '+(b.tone||'info')+'">'+inline(b.content)+'</div>'; break;
      case 'video':
        wrap.innerHTML = '<div class="video-embed"><iframe src="'+ytEmbed(b.url)+'" allowfullscreen></iframe></div>'
          + (b.caption?'<div class="vid-cap">'+esc(b.caption)+'</div>':''); break;
      case 'image':
        wrap.innerHTML = '<img src="'+esc(b.url)+'" alt="'+esc(b.alt||'')+'" style="width:100%;border-radius:10px;border:1px solid var(--line)">'; break;
      case 'tool': wrap.appendChild(renderTool(b)); break;
      case 'diagnostic': wrap.appendChild(renderDiagnostic(b)); break;
      case 'activity': wrap.appendChild(renderActivity(b)); break;
      case 'reflection': wrap.appendChild(renderReflection(b)); break;
      case 'submission': wrap.appendChild(renderSubmission(b)); break;
      default: wrap.innerHTML = '';
    }
    return wrap;
  }

  function ytEmbed(url){
    var m = (url||'').match(/(?:v=|youtu\.be\/|embed\/)([\w-]{11})/);
    return m ? 'https://www.youtube.com/embed/'+m[1] : esc(url||'');
  }

  function renderTool(b){
    var d = document.createElement('div');
    d.className = 'tool-card';
    d.innerHTML = '<div class="tool-ic">🛠️</div><div class="tool-body">'
      + '<div class="tool-name">'+esc(b.name)+'<span class="tool-tag">'+esc((b.categoryTag||'').toUpperCase())+'</span></div>'
      + '<div class="tool-desc">'+esc(b.description||'')+'</div>'
      + (b.tutorialNote?'<div class="tool-note">'+esc(b.tutorialNote)+'</div>':'')
      + '</div>';
    var btn = document.createElement('button');
    btn.className = 'btn'; btn.textContent = 'OPEN';
    btn.addEventListener('click', function(){ window.open(b.launchUrl, '_blank', 'noopener'); });
    d.appendChild(btn);
    return d;
  }

  function markDone(blockId, label){
    var bs = blockState(blockId);
    if(bs.done) return;
    bs.done = true;
    var phase = PHASES[state.currentPhase];
    persist();
    if(isPhaseComplete(state.currentPhase)){
      postToNode('pflx_mod_checkpoint', { checkpointId: phase.id, label: phase.title });
      postToNode('pflx_mod_stat', { stats: [{ key:'phasesComplete', label:'Phases complete',
        value: PHASES.filter(function(_,i){return isPhaseComplete(i);}).length, max: PHASES.length }] });
    }
    render();
    toast(label || 'Task complete ✓');
  }

  /* diagnostic */
  function renderDiagnostic(b){
    var bs = blockState(b.id);
    if(!bs.ratings) bs.ratings = {};
    var d = document.createElement('div');
    d.className = 'task' + (bs.done?' done':'');
    var head = '<div class="task-head"><span class="task-badge">DIAGNOSTIC</span></div>';
    var instr = '<div class="task-instr">'+esc(b.prompt)+'</div>';
    d.innerHTML = head + instr;
    b.items.forEach(function(it){
      var row = document.createElement('div');
      row.className = 'dx-item';
      var scale = b.scale.map(function(opt, oi){
        var sel = bs.ratings[it.id] === oi ? ' sel' : '';
        return '<span class="dx-opt'+sel+'" data-it="'+it.id+'" data-oi="'+oi+'">'+esc(opt)+'</span>';
      }).join('');
      row.innerHTML = '<div class="dx-label">'+esc(it.label)+'</div><div class="dx-scale">'+scale+'</div>';
      d.appendChild(row);
    });
    d.querySelectorAll('.dx-opt').forEach(function(opt){
      opt.addEventListener('click', function(){
        if(bs.done) return;
        bs.ratings[opt.getAttribute('data-it')] = +opt.getAttribute('data-oi');
        persist(); rerenderBlock(b, d.parentNode);
      });
    });
    var allRated = b.items.every(function(it){ return bs.ratings[it.id] != null; });
    var foot = document.createElement('div');
    foot.className = 'task-foot';
    if(bs.done){
      foot.innerHTML = '<span class="done-tag">✓ Saved — revisit at the end of the course</span>';
    } else {
      var btn = document.createElement('button');
      btn.className = 'btn solid'; btn.textContent = 'SAVE MY STARTING LINE';
      btn.disabled = !allRated;
      btn.addEventListener('click', function(){ markDone(b.id, 'Starting line saved ✓'); });
      foot.appendChild(btn);
      if(!allRated) foot.appendChild(elNote('Rate all '+b.items.length+' to continue.'));
    }
    d.appendChild(foot);
    return d;
  }

  /* activity */
  function renderActivity(b){
    var bs = blockState(b.id);
    if(!bs.fields) bs.fields = {};
    var d = document.createElement('div');
    d.className = 'task' + (bs.done?' done':'');
    d.innerHTML = '<div class="task-head"><span class="task-badge">'+(bs.done?'COMPLETE':'TASK')+'</span>'
      + '<span class="task-title">'+esc(b.title)+'</span></div>'
      + '<div class="task-instr">'+esc(b.instructions)+'</div>';
    b.fields.forEach(function(f){
      var fd = document.createElement('div');
      fd.className = 'field';
      var ctl = f.type==='textarea'
        ? '<textarea data-f="'+f.id+'">'+esc(bs.fields[f.id]||'')+'</textarea>'
        : '<input type="text" data-f="'+f.id+'" value="'+esc(bs.fields[f.id]||'')+'">';
      fd.innerHTML = '<label>'+esc(f.label)+'</label>'+ctl;
      d.appendChild(fd);
    });
    bindFields(d, bs);
    var foot = document.createElement('div');
    foot.className = 'task-foot';
    if(bs.done){
      foot.innerHTML = '<span class="done-tag">✓ Task complete</span>';
      var reopen = document.createElement('button');
      reopen.className = 'btn ghost'; reopen.textContent = 'EDIT';
      reopen.addEventListener('click', function(){ bs.done = false; persist(); render(); });
      foot.appendChild(reopen);
    } else {
      var btn = document.createElement('button');
      btn.className = 'btn solid'; btn.textContent = 'MARK TASK COMPLETE';
      btn.addEventListener('click', function(){ markDone(b.id); });
      var note = elNote('Fill in every field to complete this task.');
      var refresh = function(){
        var ok = b.fields.every(function(f){ return (bs.fields[f.id]||'').trim(); });
        btn.disabled = !ok; note.style.display = ok ? 'none' : '';
      };
      d.addEventListener('input', refresh);
      foot.appendChild(btn); foot.appendChild(note);
      refresh();
    }
    d.appendChild(foot);
    return d;
  }

  /* reflection */
  function renderReflection(b){
    var bs = blockState(b.id);
    if(!bs.fields) bs.fields = {};
    var d = document.createElement('div');
    d.className = 'task' + (bs.done?' done':'');
    d.innerHTML = '<div class="task-head"><span class="task-badge">'+(bs.done?'COMPLETE':'REFLECTION')+'</span>'
      + '<span class="task-title">'+esc(b.title||'Reflect')+'</span></div>';
    b.prompts.forEach(function(p){
      var fd = document.createElement('div');
      fd.className = 'field';
      fd.innerHTML = '<label>'+esc(p.prompt)+'</label><textarea data-f="'+p.id+'">'+esc(bs.fields[p.id]||'')+'</textarea>';
      d.appendChild(fd);
    });
    bindFields(d, bs);
    var foot = document.createElement('div');
    foot.className = 'task-foot';
    if(bs.done){
      foot.innerHTML = '<span class="done-tag">✓ Reflection saved</span>';
    } else {
      var btn = document.createElement('button');
      btn.className = 'btn solid'; btn.textContent = 'SAVE REFLECTION';
      btn.addEventListener('click', function(){ markDone(b.id, 'Reflection saved ✓'); });
      var note = elNote('Respond to every prompt to continue.');
      var refreshR = function(){
        var ok = b.prompts.every(function(p){ return (bs.fields[p.id]||'').trim(); });
        btn.disabled = !ok; note.style.display = ok ? 'none' : '';
      };
      d.addEventListener('input', refreshR);
      foot.appendChild(btn); foot.appendChild(note);
      refreshR();
    }
    d.appendChild(foot);
    return d;
  }

  /* submission */
  function renderSubmission(b){
    var bs = blockState(b.id);
    if(!bs.fields) bs.fields = {};
    var d = document.createElement('div');
    d.className = 'task' + (bs.done?' done':'');
    d.innerHTML = '<div class="task-head"><span class="task-badge">'+(bs.done?'SUBMITTED':'FINAL SUBMISSION')+'</span>'
      + '<span class="task-title">'+esc(b.title)+'</span></div>'
      + '<div class="task-instr">'+esc(b.instructions)+'</div>';
    if(bs.done){
      d.innerHTML += '<div class="callout success" style="margin-top:6px">'
        + '<span class="pill">PENDING APPROVAL</span><br><br>'
        + 'Your submission was sent to your host. Once it is approved you will receive '
        + (MANIFEST.suggestedReward? MANIFEST.suggestedReward.xc+' XC and your badge.' : 'your reward.')
        + '</div>';
      return d;
    }
    if(b.acceptLink){
      var f1 = document.createElement('div'); f1.className = 'field';
      f1.innerHTML = '<label>Link to your finished storyboard and screencast</label>'
        + '<input type="text" data-f="link" value="'+esc(bs.fields.link||'')+'">';
      d.appendChild(f1);
    }
    if(b.acceptFile){
      var f2 = document.createElement('div'); f2.className = 'field';
      f2.innerHTML = '<label>Or attach a file</label><input type="file" data-f="file">';
      d.appendChild(f2);
    }
    var f3 = document.createElement('div'); f3.className = 'field';
    f3.innerHTML = '<label>Description'+(b.descriptionRequired?' (required)':'')+'</label>'
      + '<textarea data-f="description" placeholder="'+esc(b.descriptionHint||'')+'">'+esc(bs.fields.description||'')+'</textarea>';
    d.appendChild(f3);
    bindFields(d, bs);
    var fileInput = d.querySelector('input[type=file]');
    if(fileInput){
      fileInput.addEventListener('change', function(){
        bs.fields.fileName = fileInput.files[0] ? fileInput.files[0].name : '';
        persist();
      });
    }
    var foot = document.createElement('div');
    foot.className = 'task-foot';
    var btn = document.createElement('button');
    btn.className = 'btn green'; btn.textContent = 'SUBMIT FOR APPROVAL';
    function ready(){
      var hasWork = (bs.fields.link||'').trim() || (bs.fields.fileName||'').trim();
      var desc = (bs.fields.description||'').trim();
      var descOk = !b.descriptionRequired || desc.length >= (b.descriptionMinLength||0);
      return hasWork && descOk;
    }
    btn.disabled = !ready();
    d.addEventListener('input', function(){ btn.disabled = !ready(); });
    btn.addEventListener('click', function(){ doSubmit(b, bs); });
    foot.appendChild(btn);
    foot.appendChild(elNote('Add your work (link or file) and a description of at least '+(b.descriptionMinLength||0)+' characters.'));
    d.appendChild(foot);
    return d;
  }

  function doSubmit(b, bs){
    var submission = {
      link: bs.fields.link||'', file: bs.fields.fileName||'', description: bs.fields.description||''
    };
    bs.done = true; state.submitted = true;
    postToNode('pflx_mod_submission', { fields: submission });
    postToNode('pflx_mod_complete', {
      score: null, finalState: state, submission: submission
    });
    persist();
    render();
    toast('Submitted — sent to your host for approval.');
  }

  function bindFields(container, bs){
    container.querySelectorAll('[data-f]').forEach(function(el){
      if(el.type === 'file') return;
      el.addEventListener('input', function(){
        bs.fields[el.getAttribute('data-f')] = el.value;
        persist();
      });
    });
  }

  function rerenderBlock(b, container){
    // light re-render of a diagnostic for selection feedback
    render();
  }

  function elNote(txt){
    var s = document.createElement('span');
    s.className = 'gate-note'; s.textContent = txt;
    return s;
  }

  function renderNav(phase){
    var nav = document.createElement('div');
    nav.className = 'nav-row';
    var idx = state.currentPhase;
    var complete = isPhaseComplete(idx);
    var last = idx === PHASES.length - 1;

    var left = document.createElement('div');
    if(idx > 0){
      var back = document.createElement('button');
      back.className = 'btn ghost'; back.textContent = '← ' + PHASES[idx-1].title;
      back.addEventListener('click', function(){ state.currentPhase = idx-1; persist(); render(); });
      left.appendChild(back);
    }
    nav.appendChild(left);

    var right = document.createElement('div');
    right.style.display = 'flex'; right.style.alignItems = 'center'; right.style.gap = '12px';
    if(last){
      var msg = document.createElement('span');
      if(state.submitted){ msg.className = 'gate-note ok'; msg.textContent = 'Module complete — awaiting host approval.'; }
      else { msg.className = 'gate-note'; msg.textContent = 'Submit your final work above to complete the module.'; }
      right.appendChild(msg);
    } else {
      var note = document.createElement('span');
      note.className = 'gate-note' + (complete?' ok':'');
      note.textContent = complete ? 'Phase complete — you can continue.' : 'Finish every task in this phase to unlock the next.';
      right.appendChild(note);
      var next = document.createElement('button');
      next.className = 'btn solid'; next.textContent = PHASES[idx+1].title + ' →';
      next.disabled = !complete;
      next.addEventListener('click', function(){
        state.currentPhase = idx+1; persist(); render();
        document.querySelector('.main').scrollTop = 0;
      });
      right.appendChild(next);
    }
    nav.appendChild(right);
    return nav;
  }

  /* ============ CONNECTOR HANDSHAKE ============ */
  window.addEventListener('message', function(ev){
    var msg = ev.data;
    if(!msg || typeof msg !== 'object' || !msg.type) return;
    if(msg.type === 'pflx_mod_init'){
      var p = msg.payload || {};
      if(p.player){
        session.displayName = p.player.brand || p.player.displayName || session.displayName;
        session.initials = p.player.initials || session.initials;
      }
      // Tier from Node (when tier picker lands) overrides URL/default.
      // Only valid values; unknown tier falls back via tierPhases().
      if(p.tier && ['starter','novice','pro'].indexOf(p.tier) >= 0 && p.tier !== CURRENT_TIER){
        CURRENT_TIER = p.tier;
        PHASES = tierPhases(CURRENT_TIER);
        // Reset phase pointer if the new tier has fewer phases than current state expects.
        if(state.currentPhase >= PHASES.length) state.currentPhase = 0;
      }
      if(p.save && p.save.blocks){ state = p.save; }
      render();
      postToNode('pflx_mod_progress', { percent: progressPercent() });
    } else if(msg.type === 'pflx_mod_command'){
      var c = (msg.payload||{}).command;
      if(c === 'reset'){ state = { currentPhase:0, blocks:{}, submitted:false }; persist(); render(); }
    } else if(msg.type === 'pflx_mod_approval_result'){
      var r = msg.payload || {};
      toast(r.approved ? 'Approved! Reward unlocked.' : 'Returned for revision: ' + (r.note||''));
    } else if(msg.type === 'pflx_mod_teardown'){
      persist();
    }
  });

  /* ---- boot ---- */
  loadStandalone();
  render();
  postToNode('pflx_mod_ready', {
    moduleId: MANIFEST.moduleId, name: MANIFEST.name, version: MANIFEST.version,
    protocolVersion: MANIFEST.protocolVersion, capabilities: MANIFEST.capabilities
  });
  postToNode('pflx_mod_progress', { percent: progressPercent() });

})();
</script>
</body>
</html>
